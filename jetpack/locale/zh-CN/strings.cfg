[mod-name]
jetpack=喷气背包

[mod-description]
jetpack=让您可以制造喷气背包模块，使您可以在建筑物和水面上高速飞行。

[jetpack]
menu_jetpack=喷气背包 [img=item/jetpack-1]
title_jetpack=喷气背包
page_jetpack_text_1=喷气背包是可装备在装甲网格中的设备部件。\n\n若装备网格中装有喷气背包且物品栏存有燃料，按下__CONTROL__jetpack__键即可启动飞行。火箭燃料效果最佳，但核燃料和固体燃料同样可用。[color=0.5,0.7,0.8]（部分模组燃料亦适用，例如AAI工业的加工燃料。）[/color]  \n\n飞行能让你跨越障碍物与水域。飞行时会保留动量，因此急转更为困难，但能获得更高速度。\n\n
喷气背包分为4个等级，高阶背包提供更强推力。同一装备网格中可叠加多个喷气背包以进一步提升速度。[color=0.5,0.7,0.8]（可通过模组设置禁用叠加功能。）[/color]\n\n喷气背包的最终加速度会受重量削减，重量主要受装甲网格尺寸影响。起飞时将显示当前加速度值。[color=0.5,0.7,0.8]（玩家可单独设置模组关闭该提示。）[/color]\n\n喷气背包会干扰护盾——速度越快护盾衰减越强。护盾衰减按百分比计算，且不被视作伤害。[color=0.5,0.7,0.8]（模组选项可调整护盾衰减系数。）[/color] \n\n战斗中使用喷气背包极具战术价值，但需格外谨慎：若飞行中受到攻击，你可能会被击落坠地。[color=0.5,0.7,0.8]（模组设置可关闭此效果。）[/color]  
need_jetpack=需要喷气背包模块才能飞行。
need_fuel=背包中没有燃料。
ran_out_of_fuel=燃料耗尽！
cant_fly_inside=不能在建筑物内飞行。
