jetpack-fall-on-damage=Якщо ввімкнено політ буде припинено після отримання ушкодження.
jetpack-thrust-stacks=Якщо ввімкнено ефект декількох ракетних ранців накладається. Якщо вимкнено наявність декількох ракетних ранців в сітці спорядження не надає підвищення тяги та швидкості.
jetpack-print-thrust=Писати кінцеве значення прискорення ракетного ранцю в консоль при зльоті.
jetpack-volume=Гучність звуку реактивного ранцю.
jetpack-fuel-consumption=Збільшити або зменшити споживання палива для реактивного ранцю.
jetpack-speed-reduces-shields=Величина зниження ємності енергетичних щитів з підвищенням швидкості.
