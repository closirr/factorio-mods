[equipment-description]
jetpack-1=[font=default-bold][color=#f5cb48]Тяга: 1[/color][/font]\nДля активації натисніть __CONTROL__jetpack__.\nДозволяє літати над будівлями та водою. Декілька ракетних ранців дозволяють літати ще швидше. Ракетне паливо дає найкращі результати, але також може спалювати ядерне паливо, тверде паливо, оброблене паливо (з модифікації AAI Industry) та деякі інші модифіковані види палива.
