jetpack-character=__1__ (飛行)

[equipment-name]
jetpack-1=噴氣背包設備 MK1
jetpack-2=噴氣背包設備 MK2
jetpack-3=噴氣背包設備 MK3
jetpack-4=噴氣背包設備 MK4

[equipment-description]
jetpack-1=[font=default-bold][color=#f5cb48]推力：1[/color][/font]\n按__CONTROL__jetpack__鍵啟動。多個噴氣背包讓您飛得更快。飛行會消耗庫存中的燃料。火箭燃料的效果最好，但也可以燃燒核燃料、固體燃料、加工燃料（來自AAI Industry 基礎工業）和一些其他改裝燃料。
jetpack-2=[font=default-bold][color=#f5cb48]推力：2[/color][/font]\n按__CONTROL__jetpack__鍵啟動。多個噴氣背包讓您飛得更快。飛行會消耗庫存中的燃料。火箭燃料的效果最好，但也可以燃燒核燃料、固體燃料、加工燃料（來自AAI Industry 基礎工業）和一些其他改裝燃料。
jetpack-3=[font=default-bold][color=#f5cb48]推力：3[/color][/font]\n按__CONTROL__jetpack__鍵啟動。多個噴氣背包讓您飛得更快。飛行會消耗庫存中的燃料。火箭燃料的效果最好，但也可以燃燒核燃料、固體燃料、加工燃料（來自AAI Industry 基礎工業）和一些其他改裝燃料。
jetpack-4=[font=default-bold][color=#f5cb48]推力：4[/color][/font]\n按__CONTROL__jetpack__鍵啟動。多個噴氣背包讓您飛得更快。飛行會消耗庫存中的燃料。火箭燃料的效果最好，但也可以燃燒核燃料、固體燃料、加工燃料（來自AAI Industry 基礎工業）和一些其他改裝燃料。

