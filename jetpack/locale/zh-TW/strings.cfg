#Jetpack translation by Cassidy in https://discord.gg/y7AXRdCQqv 2025/09/23
#jetpack_0.4.12
[mod-name]
jetpack=Jetpack 噴氣背包

[mod-description]
jetpack=讓你製作噴氣式裝備套件，可以利用它在建築物和水面上快速飛行。

[jetpack]
menu_jetpack=噴氣背包 [img=item/jetpack-1]
title_jetpack=噴氣背包
page_jetpack_text_1=噴氣背包是可以放入裝甲格中的裝備。 \n\n如果你的裝備格中有噴氣背包並且庫存中有燃料，那麼你可以按__CONTROL__jetpack__開始飛行。火箭燃料會產生最佳效果，但也可以使用核燃料和固體燃料。 [color=0.5,0.7,0.8]（以及一些改裝燃料，例如 AAI Industry 的加工燃料。）[/color]\n\n飛行可以讓你越過障礙物和水。飛行時你有動量，所以很難突然轉彎，但你可以達到更高的速度。 \n\n噴氣背包有 4 個等級，更高等級的噴氣背包提供的推力更大。您可以將多個噴氣背包裝備放入同一個裝備格中，以進一步提高您的速度。 [color=0.5,0.7,0.8]（可使用模組選項停用噴氣背包堆疊。）[/color]\n\n噴氣背包的最終加速度值會因重量而減少，這主要受裝甲網格尺寸的影響。起飛時顯示加速度值。 [color=0.5,0.7,0.8]（每個玩家的模組設定可以停用警報。）[/color]\n\n噴氣背包會干擾護盾，你飛得越快，護盾就會減少得越多。護盾的減少是基於百分比的，不計入傷害。 [color=0.5,0.7,0.8]（護盾減少乘數可以透過模組選項控制。）[/color]\n\n在戰鬥中使用噴氣背包的威力很大，但你需要小心；如果您在飛行時受到傷害，您可能會被擊倒在地。 [color=0.5,0.7,0.8]（透過模組設定可以停用此效果。）[/color]
need_jetpack=你需要一個噴氣背包才能飛行。
need_fuel=庫存中沒有噴氣背包燃料。
ran_out_of_fuel=噴氣背包沒油了！
cant_fly_inside=無法在裡面飛行。
jetpack_acceleration=噴氣背包加速度：__1__
jetpack_acceleration_with_fuel_bonus=噴氣背包加速度：__1__（__2__% 來自 __3____4__）

