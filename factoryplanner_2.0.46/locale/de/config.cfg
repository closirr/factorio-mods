solver_choice_tt=Wählen Sie aus, welchen Lösungsalgorithmus für diese Fabrik verwenden werden soll. Der traditionelle Lösungsalgorithmus arbeitet, indem er Ihre Rezepte der Reihe nach durchgeht und deren Bedarf ermittelt. Der Matrixlöser hingegen kann Schleifen und Nebenprodukte berücksichtigen, benötigt jedoch manchmal zusätzliche Konfiguration.
