unrestricted_items_balanced_tt=Die aktuelle Auswahl an uneingeschränkten Gegenständen ist ausgeglichen.\n\nUm andere uneingeschränkte Gegenstände auszuwählen, muss zuerst einer der aktuellen eingeschränkt werden.
