utility_title_notes=Anmerkungen
utility_title_productivity_boni=Rezeptproduktivität
utility_title_productivity_boni_tt=Ermöglicht das Überschreiben des aktuellen Bonus für Rezepte, die durch Forschung zusätzliche Produktivität erzielen können.
utility_productivity_imported=Bonusse importiert
components_needed_tt=__1__\n[font=default-bold]__2__[/font] im Inventar / [font=default-bold]__3__[/font]  erforderlich\n[font=default-semibold][color=#84CDEC]__CONTROL_LEFT_CLICK__[/color][/font] um diesen Gegenstand herzustellen
