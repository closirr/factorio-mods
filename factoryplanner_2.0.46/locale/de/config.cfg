[mod-name]
factoryplanner=Factory Planner

[mod-description]
factoryplanner=Diese Mod ermöglicht es dir, deine Produktion im Voraus zu planen, indem du die Rezepte und Maschinen festlegst, aus denen jede Fabrik besteht. Sie bietet leistungsstarke Funktionen, die schnell und intuitiv zu bedienen sind, sodass du dich darauf konzentrieren kannst, deine Fabrik tatsächlich zu bauen.


