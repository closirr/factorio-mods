export_instruction=Wählen Sie die Fabriken aus, die Sie exportieren möchten.
export_instruction_tt=Dies erzeugt einen [font=default-bold]Code zum Fabrikenaustausch[/font], mit dem Sie Ihre Fabriken mit anderen teilen oder in eine Ihrer anderen Welten importieren können. Es wird kein Blaupausen-Code generiert!
import_button_tooltip=Code Importieren
export_button_tooltip=Generiere den Code zum Fabrikenaustausch
importer_decoding_failure=Der Code konnte nicht erfolgreich entschlüsselt werden, da dieser fehler behaftet ist. Versuchen Sie erneut, die Fabrik zu exportieren, und stellen Sie sicher, dass Sie die gesamte Zeichenfolge kopieren.
importer_migration_failure=Der gegebene Code stammt aus einer älteren Version von Factory Planner und konnte nicht migriert werden. Dies kann daran liegen, dass sie zu alt ist und nicht mehr unterstützt wird, dass die Daten in irgendeiner Weise beschädigt sind oder dass ein Programmierfehler vorliegt. Wenn Sie der Meinung sind, dass diese Zeichenfolge gültig sein sollte, wenden Sie sich bitte an den Entwickler auf Github. Einen Link dazu befinet sich auf der Modpage.
importer_unpacking_failure=Der gegebene Code konnte nicht ordnungsgemäß entpackt und validiert werden. Dies kann daran liegen, dass die Daten in irgendeiner Weise beschädigt sind oder dass ein Programmierfehler vorliegt. Wenn Sie der Meinung sind, dass diese Zeichenfolge gültig ist, wenden Sie sich bitte an den Entwickler auf Github. Einen Link dazu befinet sich auf der Modpage.
importer_issue_import_string=Importiere einen gültigen Code zum Fabrikenaustausch
importer_issue_select_factory=Wählen Sie mindestens eine Fabrik zum Importieren aus.

