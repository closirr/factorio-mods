choose_unrestricted_items_tt=Wähle insgesamt [font=default-bold]__1__[/font] uneingeschränkte __2__, damit der Matrixlöser eine eindeutige Lösung bestimmen kann.\n\nAuf der linken Seite sind die eingeschränkten Gegenstände aufgelistet, auf der rechten Seite die uneingeschränkten. Klicken Sie auf einen Gegenstand, um ihn auf die andere Seite zu verschieben.\n\nUneingeschränkte Gegenstände können je nach Lösung des Lösers zu Nebenprodukten oder Zutaten werden.
