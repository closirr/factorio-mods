[equipment-description]
equipment-bot-chip-items=設定個人機器人港自動標記地面物品以拾取。需要有可用機器人且在網路中。附近有敵人時不會標記。
equipment-bot-chip-trees=設定個人機器人港自動標記範圍內樹木以拆除。需要有可用機器人且在網路中。附近有敵人時不會標記。
equipment-bot-chip-launcher=設定個人機器人港在敵人進入範圍時自動從背包發射戰鬥單位。需要啟用的個人機器人港。
equipment-bot-chip-feeder=緊急供給器：生命值較低時自動使用治療物品；冷卻30秒。若無治療物品則恢復10點。需要個人機器人港。
equipment-bot-chip-nanointerface=允許奈米機器人在物流單元內運作。只需要1個晶片。即使沒有個人機器人港或機器人也能運作。

