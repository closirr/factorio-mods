[virtual-signal-name]
nano-signal-chop-trees=機器人港介面\n標記樹木拆除\n設為負數：僅砍樹直到\n網路中有\n指定數量的原木。
nano-signal-item-on-ground=機器人港介面\n標記地面物品
nano-signal-closest-roboport=機器人港介面\n只在範圍內\n最近的機器人港執行
nano-signal-deconstruct-finished-miners=機器人港介面\n拆除已枯竭的採礦機
nano-signal-landfill-the-world=機器人港介面\n用填埋覆蓋所有水域\n設為負數：保留網路中\n指定數量的填埋
nano-signal-catch-fish=機器人港介面\n尋找所有魚\n魚很好，魚很棒
nano-signal-build-tiles=機器人港介面\n鋪設地磚\n將地磚信號作為下一個信號\n以鋪設該類型地磚\n設為負數：僅當網路中\n至少有指定數量時鋪設。
nano-signal-smarter-charging=機器人港介面\n更智慧充電\n定期強制部分機器人\n尋找新的充電位置。
nano-signal-upgrade-modules=機器人港介面\n模組升級器\n以高階模組替換\n低階模組。
nano-signal-refill-turrets=機器人港介面\n補充炮塔\n設為正數：為炮塔\n補充彈藥。

