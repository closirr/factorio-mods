[item-description]
gun-nano-emitter=只要奈米發射器是目前選取武器，就會依彈藥類型自動派出預先編程的奈米機器人。奈米機器人無法在既有物流網路內運作。
ammo-nano-termites=摧毀範圍內的樹木。不返還物品。
ammo-nano-scrappers=摧毀範圍內標記為拆除的實體。不返還物品。
ammo-nano-deconstructors=拆除範圍內標記為拆除的實體。會把物品返還給你。
ammo-nano-constructors=使用背包中的物品在範圍內復活實體幽靈。也會修理受損實體。
equipment-bot-chip-items=設定個人機器人港自動標記地面物品以拾取。需要有可用機器人且在網路中。附近有敵人時不會標記。
equipment-bot-chip-trees=設定個人機器人港自動標記範圍內樹木以拆除。需要有可用機器人且在網路中。附近有敵人時不會標記。
equipment-bot-chip-launcher=設定個人機器人港在敵人進入範圍時自動從背包發射戰鬥單位。需要個人機器人港。
equipment-bot-chip-feeder=緊急供給器：生命值較低時自動使用治療物品；每個供給器有2分鐘冷卻。需要個人機器人港。
equipment-bot-chip-nanointerface=允許奈米機器人在物流單元內運作。只需要1個晶片。
roboport-interface-main=連線到最近的物流網路以分配工作。

