[mod-setting-description]
nanobots-nanobots-auto=啟用後奈米發射器會自動運作。停用則需要手動向區域發射奈米機器人。（尚未實作）
nanobots-network-limits=派出奈米機器人前檢查是否存在物流網路。
nanobots-nano-poll-rate=每隔多少tick搜尋奈米任務。每tick處理一位玩家。
nanobots-nano-queue-rate=佇列動作之間的tick延遲。
nanobots-nano-queue-per-cycle=每週期最多入隊的實體數量。
nanobots-indside-area-radius=距離任務過遠時取消任務。
nanobots-cell-queue-rate=機器人港介面佇列檢查間隔（tick）。
nanobots-free-bots-per=機器人港介面入隊任務所需的可用建造機器人百分比。
nanobots-equipment-auto=啟用後奈米裝甲裝備自動運作；停用需手動啟用。（尚未實作）
nanobots-nano-build-tiles=允許奈米機器人鋪設地磚。
nanobots-afk-time=AFK超過此秒數後奈米機器人停止。0=永不停止。
nanobots-nano-fullfill-requests=奈米機器人會嘗試滿足 item-request proxy。
nanobots-active-emitter-mode=必須將奈米發射器作為目前選取武器才能運作。
nanobots-log-level=設定日誌等級。\nOff - 關閉\nStandard - 僅重要資訊\nDebug - 完整追蹤
nanobots-nano-repair=奈米機器人使用背包中的修理包自動修理受損實體。

nanobots-repair-start-threshold=僅當實體生命比例低於此值時開始修理（忽略輕微損傷）。
nanobots-repair-max-sessions=每位玩家最大同時修理會話數量。
nanobots-repair-hp-per-action=每次修理步進恢復的HP數量。
nanobots-repair-requeue-delay=修理步進之間的tick延遲。
nanobots-repair-throttle-ticks=同一實體修理檢查不超過此tick頻率（0停用）。
nanobots-repair-combat-important-only=戰鬥中僅修理重要目標（砲塔/牆/門→雷達→地雷→運輸）。
nanobots-repair-combat-enemy-radius=此半徑內有敵人則視為戰鬥中。
nanobots-repair-combat-recent-damage-seconds=此時間窗內受傷則視為戰鬥中。
nanobots-repair-cat-defense=砲塔、牆、門、雷達、地雷。
nanobots-repair-cat-transport=汽車、蜘蛛機甲、火車與車廂。
nanobots-repair-cat-power=完整供電鏈（電力+蒸汽/熱/流體基礎設施）。
nanobots-repair-cat-production=組裝機、熔爐、採礦機、機械臂、機器人港、實驗室、插件塔。
nanobots-repair-cat-other=箱子、儲罐等其他實體。

[string-mod-setting]
nanobots-log-level-off=關閉
nanobots-log-level-standard=標準
nanobots-log-level-debug=除錯