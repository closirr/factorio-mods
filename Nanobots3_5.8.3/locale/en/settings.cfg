[mod-setting-description]
nanobots-nanobots-auto=If enabled, the Nano Emitter works automatically. If disabled, you will need to manually shoot nanobots into an area. (Not available yet)
nanobots-network-limits=Checks for existing logistic networks before dispatching nanobots.
nanobots-nano-poll-rate=How often (in ticks) nanobot orders are searched for. One player is processed each tick.
nanobots-nano-queue-rate=Delay in ticks between queue actions.
nanobots-nano-queue-per-cycle=Maximum number of entities queued per cycle.
nanobots-indside-area-radius=How far away you can be from a queued entity before it is canceled.
nanobots-cell-queue-rate=Delay in ticks between checking roboports queued by the roboport interface.
nanobots-free-bots-per=For ROBOPORT INTERFACE only (not nanobots!). Percentage of regular construction robots to KEEP FREE in logistic network. 0% = use all robots, 50% = keep half free for other tasks, 100% = don't use any robots.
nanobots-equipment-auto=If enabled, bot-chip equipment (launcher, item collector, tree cutter, shield healer) works automatically. If disabled, you must activate it manually.
nanobots-nano-build-tiles=Allows nanobots to build tiles.
nanobots-afk-time=How long (in seconds) you can be AFK before nanobots shut down. 0 = never shut down.
nanobots-nano-fullfill-requests=Nanobots will attempt to fulfill item-request proxies.
nanobots-active-emitter-mode=Nano Emitter must be the selected weapon for nanobots to operate.
nanobots-log-level=Set the logging level for nanobots.\nOff - No logging\nStandard - Important messages only (modules, results)\nDebug - Full tracing and all operations
nanobots-nano-repair=Nanobots will automatically repair damaged entities using repair packs from your inventory.

; --- Repair 4.7.0 ---
nanobots-repair-start-threshold=Start repairs only when an entity health ratio is below this value (ignores minor damage).
nanobots-repair-max-sessions=Maximum number of active repair sessions per player.
nanobots-repair-hp-per-action=How many HP are repaired per repair step.
nanobots-repair-requeue-delay=Delay in ticks between repair steps.
nanobots-repair-throttle-ticks=Do not re-check the same entity for repairs more often than this number of ticks (0 disables).
nanobots-repair-combat-important-only=When in combat, repair only important targets (turrets/walls/gates → radar → mines → transport).
nanobots-repair-combat-enemy-radius=If any enemy is within this radius, the player is considered in combat.
nanobots-repair-combat-recent-damage-seconds=If the player was damaged within this time window, the player is considered in combat.
nanobots-repair-cat-defense=Turrets, walls, gates, radar, land mines.
nanobots-repair-cat-transport=Cars, spidertrons, trains and wagons.
nanobots-repair-cat-power=Full power chain (electric + steam/heat/fluid infrastructure).
nanobots-repair-cat-production=Assemblers, furnaces, miners, inserters, roboports, labs, beacons.
nanobots-repair-cat-other=Containers, storage tanks and other miscellaneous entities.

[string-mod-setting]
nanobots-log-level-off=Off
nanobots-log-level-standard=Standard
nanobots-log-level-debug=Debug