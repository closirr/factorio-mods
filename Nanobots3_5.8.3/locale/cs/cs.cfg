nano-signal-landfill-the-world=Rozhraní roboportu\nZasypat veškerou vodu zeminou\nZáporná hodnota = ponechat v síti\nalespoň tolik zeminy
nano-signal-catch-fish=Rozhraní roboportu\nNajít všechny ryby\nRyby jsou dobré, ryby jsou skvělé
