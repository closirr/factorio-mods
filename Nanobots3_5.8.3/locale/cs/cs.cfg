[item-description]
gun-nano-emitter=Automaticky vysílá předprogramované nanoboty podle typu munice, pokud je Nano emitor aktuálně zvolenou zbraní. Nanoboti nefungují v existujících logistických sítích.
ammo-nano-termites=Ničí stromy v dosahu. Nepřináší zpět žádné předměty.
ammo-nano-scrappers=Ničí entity označené k demontáži v dosahu. Nepřináší zpět žádné předměty.
ammo-nano-deconstructors=Demontuje entity označené k demontáži v dosahu. Vrátí předměty vám.
ammo-nano-constructors=Oživuje duchy entit v dosahu pomocí předmětů z vašeho inventáře. Také opravuje poškozené entity.
equipment-bot-chip-items=Nastaví osobní roboporty, aby automaticky označovaly předměty na zemi k vyzvednutí. Musí být v síti s dostupnými roboty. Předměty se neoznačují, pokud jsou poblíž nepřátelé.
equipment-bot-chip-trees=Nastaví osobní roboporty, aby automaticky označovaly stromy v dosahu k demontáži. Musí být v síti s dostupnými roboty. Stromy se neoznačují, pokud jsou poblíž nepřátelé.
equipment-bot-chip-launcher=Nastaví osobní roboporty, aby automaticky spouštěly bojové jednotky z inventáře, když jsou nepřátelé v dosahu. Vyžaduje osobní roboport.
equipment-bot-chip-feeder=Nouzový krmič, automaticky použije léčivé předměty, když je vaše zdraví nízké. Každý krmič má 2minutové obnovení. Vyžaduje osobní roboport.
equipment-bot-chip-nanointerface=Umožňuje nanobotům pracovat uvnitř logistických buněk. Stačí 1 čip.
roboport-interface-main=Propojí se s nejbližší logistickou sítí a přiděluje úkoly.

