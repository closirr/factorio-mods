[equipment-description]
equipment-bot-chip-items=Nastaví osobní roboporty, aby automaticky označovaly předměty na zemi k vyzvednutí. Musí být v síti s dostupnými roboty. Předměty se neoznačují, pokud jsou poblíž nepřátelé.
equipment-bot-chip-trees=Nastaví osobní roboporty, aby automaticky označovaly stromy v dosahu k demontáži. Musí být v síti s dostupnými roboty. Stromy se neoznačují, pokud jsou poblíž nepřátelé.
equipment-bot-chip-launcher=Nastaví osobní roboporty, aby automaticky spouštěly bojové jednotky z inventáře, když jsou nepřátelé v dosahu. Vyžaduje aktivní osobní roboport.
equipment-bot-chip-feeder=Nouzový krmič, automaticky použije léčivé předměty, když je vaše zdraví nízké; každý krmič má 30s obnovu. Pokud léčivé předměty nejsou k dispozici, vyléčí 10 bodů. Vyžaduje osobní roboport.
equipment-bot-chip-nanointerface=Umožňuje nanobotům pracovat uvnitř logistických buněk. Stačí 1 čip. Funguje i bez osobního roboportu a botů.

