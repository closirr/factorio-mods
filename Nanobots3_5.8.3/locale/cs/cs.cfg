roboport-interface-cc=Nastavte signály pro přidělení speciálních úkolů neaktivním robotům v síti. Nastavení surového dřeva přikáže robotům kácet dřevo; nastavení dlaždice přikáže stavět dlaždice. Viz dokumentace pro příklady.
roboport-interface-scanner=Skenuje síť a hlásí dostupné úkoly.

