[mod-setting-description]
nanobots-nanobots-auto=Pokud je zapnuto, nano emitor pracuje automaticky. Pokud je vypnuto, musíte nanoboty ručně vystřelit do oblasti. (Zatím nedostupné)
nanobots-network-limits=Kontroluje existující logistické sítě před vysláním nanobotů.
nanobots-nano-poll-rate=Jak často (v tikech) se hledají úkoly nanobotů. Každý tik se zpracuje jeden hráč.
nanobots-nano-queue-rate=Zpoždění v tikech mezi akcemi fronty.
nanobots-nano-queue-per-cycle=Maximální počet entit vložených do fronty za cyklus.
nanobots-indside-area-radius=Jak daleko můžete být od zařazené entity, než se úloha zruší.
nanobots-cell-queue-rate=Zpoždění v tikech mezi kontrolami roboportů ve frontě rozhraním.
nanobots-free-bots-per=Procento dostupných stavebních robotů potřebných pro rozhraní roboportu k zařazení úloh.
nanobots-equipment-auto=Pokud je zapnuto, vybavení nano brnění pracuje automaticky. Pokud je vypnuto, musíte ho aktivovat ručně. (Zatím nedostupné)
nanobots-nano-build-tiles=Umožňuje nanobotům stavět dlaždice.
nanobots-afk-time=Jak dlouho (v sekundách) můžete být AFK, než se nanoboti vypnou. 0 = nikdy nevypnout.
nanobots-nano-fullfill-requests=Nanoboti se pokusí plnit item-request proxy.
nanobots-active-emitter-mode=Nano emitor musí být zvolená zbraň, aby nanoboti fungovali.
nanobots-log-level=Nastaví úroveň logování.\nOff - bez logu\nStandard - pouze důležité zprávy\nDebug - plné trasování
nanobots-nano-repair=Nanoboti budou automaticky opravovat poškozené entity pomocí repair-packů z inventáře.

nanobots-repair-start-threshold=Začít opravovat pouze pokud je poměr zdraví entity pod touto hodnotou (ignoruje malé poškození).
nanobots-repair-max-sessions=Maximální počet aktivních oprav (relací) na hráče.
nanobots-repair-hp-per-action=Kolik HP se opraví za jeden krok opravy.
nanobots-repair-requeue-delay=Zpoždění v tikech mezi kroky opravy.
nanobots-repair-throttle-ticks=Nekontrolovat stejnou entitu na opravu častěji než tento počet tiků (0 vypne).
nanobots-repair-combat-important-only=Pokud je hráč v boji, opravovat jen důležité cíle (věže/zdi/brány → radar → miny → doprava).
nanobots-repair-combat-enemy-radius=Pokud je v tomto radiusu nepřítel, hráč je považován za „v boji“.
nanobots-repair-combat-recent-damage-seconds=Pokud byl hráč poškozen v tomto časovém okně, je považován za „v boji“.
nanobots-repair-cat-defense=Věže, zdi, brány, radary, miny.
nanobots-repair-cat-transport=Auta, spidertrony, vlaky a vagóny.
nanobots-repair-cat-power=Celý energetický řetězec (elektřina + pára/teplo/kapaliny).
nanobots-repair-cat-production=Výroba: assemblery, pece, těžba, insertery, roboporty, laboratoře, majáky.
nanobots-repair-cat-other=Kontejnery, nádrže a další různé entity.

