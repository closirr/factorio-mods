[mod-setting-description]
nanobots-nanobots-auto=Якщо увімкнено, нано-емітер працює автоматично. Якщо вимкнено — потрібно вручну “стріляти” наноботами в область. (Поки недоступно)
nanobots-network-limits=Перевіряє наявні логістичні мережі перед відправкою наноботів.
nanobots-nano-poll-rate=Як часто (в тіках) шукати завдання наноботів. Кожен тік обробляється один гравець.
nanobots-nano-queue-rate=Затримка в тіках між діями черги.
nanobots-nano-queue-per-cycle=Максимум сутностей, що додаються в чергу за цикл.
nanobots-indside-area-radius=На якій відстані від завдання воно буде скасоване.
nanobots-cell-queue-rate=Затримка в тіках між перевірками робопортів, поставлених в чергу інтерфейсом.
nanobots-free-bots-per=Відсоток доступних будівельних ботів, потрібний для постановки задач інтерфейсом.
nanobots-equipment-auto=Якщо увімкнено, обладнання працює автоматично. Якщо вимкнено — потрібно активувати вручну. (Поки недоступно)
nanobots-nano-build-tiles=Дозволяє наноботам будувати плитки.
nanobots-afk-time=Скільки секунд можна бути AFK до вимкнення наноботів. 0 = ніколи.
nanobots-nano-fullfill-requests=Наноботи спробують виконувати item-request proxy.
nanobots-active-emitter-mode=Нано-емітер має бути вибраною зброєю, щоб наноботи працювали.
nanobots-log-level=Рівень логування.\nOff - без логів\nStandard - тільки важливе\nDebug - повний трейс
nanobots-nano-repair=Наноботи автоматично ремонтують пошкоджені сутності, використовуючи ремкомплекти з інвентаря.

nanobots-repair-start-threshold=Починати ремонт лише якщо частка здоров’я сутності нижча за це значення (ігнорує дрібні пошкодження).
nanobots-repair-max-sessions=Максимальна кількість активних ремонтних сесій на гравця.
nanobots-repair-hp-per-action=Скільки HP відновлюється за один крок ремонту.
nanobots-repair-requeue-delay=Затримка в тіках між кроками ремонту.
nanobots-repair-throttle-ticks=Не перевіряти одну і ту ж сутність на ремонт частіше вказаної кількості тіків (0 вимикає).
nanobots-repair-combat-important-only=Якщо гравець у бою — ремонтувати тільки важливе (турелі/стіни/ворота → радар → міни → транспорт).
nanobots-repair-combat-enemy-radius=Якщо в цьому радіусі є ворог — вважається, що гравець у бою.
nanobots-repair-combat-recent-damage-seconds=Якщо гравець отримував урон у цьому часовому вікні — у бою.
nanobots-repair-cat-defense=Турелі, стіни, ворота, радари, міни.
nanobots-repair-cat-transport=Авто, павукотрони, поїзди та вагони.
nanobots-repair-cat-power=Увесь енергетичний ланцюг (електрика + пар/тепло/рідини).
nanobots-repair-cat-production=Збирачі, печі, бури, маніпулятори, робопорти, лабораторії, маяки.
nanobots-repair-cat-other=Контейнери, резервуари та інші сутності.

