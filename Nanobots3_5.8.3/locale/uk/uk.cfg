[virtual-signal-name]
nano-signal-chop-trees=Інтерфейс робопорта\nПозначити дерева на розбір\nНегативне значення — рубати дерева,\nпоки в мережі не буде\nстільки сирої деревини.
nano-signal-item-on-ground=Інтерфейс робопорта\nПозначити предмети на землі
nano-signal-closest-roboport=Інтерфейс робопорта\nВиконувати сигнали лише на\nнайближчому робопорті в радіусі
nano-signal-deconstruct-finished-miners=Інтерфейс робопорта\nРозбирати завершені бури
nano-signal-landfill-the-world=Інтерфейс робопорта\nЗасипати всю воду ґрунтом\nНегативне значення — тримати\nу мережі стільки ґрунту
nano-signal-catch-fish=Інтерфейс робопорта\nЗнайти всю рибу\nРиба добра, риба чудова
nano-signal-build-tiles=Інтерфейс робопорта\nБудувати плитки\nДодайте сигнал плитки як наступний\nдля будівництва цього типу\nНегативне значення — будувати лише\nякщо в мережі є мінімум\nстільки.
nano-signal-smarter-charging=Інтерфейс робопорта\nРозумна зарядка\nПеріодично змушує деяких роботів\nшукати нові місця зарядки.
nano-signal-upgrade-modules=Інтерфейс робопорта\nАпгрейд модулів\nЗмінює модулі нижчого рівня\nна вищий.
nano-signal-refill-turrets=Інтерфейс робопорта\nПоповнити турелі\nПозитивне значення — поповнювати\nтурелі боєприпасами.

