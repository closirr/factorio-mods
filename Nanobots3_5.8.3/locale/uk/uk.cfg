[entity-description]
roboport-interface-main=Підключається до найближчої логістичної мережі для призначення задач.
roboport-interface-cc=Встановіть сигнали, щоб видавати неактивним роботам спеціальні задачі. Сира деревина — рубати деревину; плитка — будувати плитки. Див. документацію.
roboport-interface-scanner=Сканує мережу і повідомляє про доступні задачі.

