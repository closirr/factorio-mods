[equipment-description]
equipment-bot-chip-items=Налаштовує персональні робопорти: автоматично позначати предмети на землі для підбору. Потрібна мережа з доступними роботами. Якщо поруч вороги — не позначає.
equipment-bot-chip-trees=Налаштовує персональні робопорти: автоматично позначати дерева в радіусі на розбір. Потрібна мережа з доступними роботами. Якщо поруч вороги — не позначає.
equipment-bot-chip-launcher=Налаштовує персональні робопорти: автоматично запускати бойові юніти з інвентаря, коли вороги в радіусі. Потрібен активний персональний робопорт.
equipment-bot-chip-feeder=Аварійний живильник: автоматично використовує лікувальні предмети при низькому здоров’ї; перезарядка 30 секунд. Якщо лікувальних предметів немає — лікує на 10. Потрібен персональний робопорт.
equipment-bot-chip-nanointerface=Дозволяє наноботам працювати всередині логістичних комірок. Достатньо 1 чипа. Працює навіть без персонального робопорта чи ботів.

