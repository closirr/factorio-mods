[item-description]
gun-nano-emitter=Автоматично відправляє запрограмованих наноботів залежно від типу боєприпасів, доки нано-емітер обраний як зброя. Наноботи не працюють у вже існуючих логістичних мережах.
ammo-nano-termites=Знищує дерева в радіусі. Предмети не повертає.
ammo-nano-scrappers=Знищує сутності, позначені на розбір, у радіусі. Предмети не повертає.
ammo-nano-deconstructors=Розбирає сутності, позначені на розбір, у радіусі. Повертає предмети вам.
ammo-nano-constructors=Відновлює “привиди” сутностей у радіусі, використовуючи предмети з інвентаря. Також ремонтує пошкоджені сутності.
equipment-bot-chip-items=Налаштовує персональні робопорти: автоматично позначати предмети на землі для підбору. Потрібна мережа з доступними роботами. Якщо поруч вороги — не позначає.
equipment-bot-chip-trees=Налаштовує персональні робопорти: автоматично позначати дерева в радіусі на розбір. Потрібна мережа з доступними роботами. Якщо поруч вороги — не позначає.
equipment-bot-chip-launcher=Налаштовує персональні робопорти: автоматично запускати бойові юніти з інвентаря, коли вороги в радіусі. Потрібен персональний робопорт.
equipment-bot-chip-feeder=Аварійний живильник: автоматично використовує лікувальні предмети при низькому здоров’ї; кожен має перезарядку 2 хвилини. Потрібен персональний робопорт.
equipment-bot-chip-nanointerface=Дозволяє наноботам працювати всередині логістичних комірок. Достатньо 1 чипа.
roboport-interface-main=Підключається до найближчої логістичної мережі для призначення задач.

