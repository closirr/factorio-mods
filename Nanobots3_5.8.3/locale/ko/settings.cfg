[mod-setting-description]
nanobots-nanobots-auto=활성화 시 나노 방출기가 자동으로 동작합니다. 비활성화 시 수동 발사가 필요합니다.(미구현)
nanobots-network-limits=나노봇 파견 전 기존 물류 네트워크를 확인합니다.
nanobots-nano-poll-rate=나노봇 작업을 찾는 주기(틱). 매 틱 1명의 플레이어를 처리합니다.
nanobots-nano-queue-rate=큐 액션 간 지연(틱).
nanobots-nano-queue-per-cycle=사이클당 큐에 넣는 최대 엔티티 수.
nanobots-indside-area-radius=큐 작업 대상에서 이 거리보다 멀어지면 취소됩니다.
nanobots-cell-queue-rate=로보포트 인터페이스 큐 확인 주기(틱).
nanobots-free-bots-per=로보포트 인터페이스가 작업을 큐에 넣기 위해 필요한 건설 로봇 여유 비율.
nanobots-equipment-auto=활성화 시 장비가 자동 동작합니다. 비활성화 시 수동 활성화 필요.(미구현)
nanobots-nano-build-tiles=나노봇으로 타일 건설을 허용합니다.
nanobots-afk-time=AFK가 이 시간(초)을 넘으면 나노봇이 중지됩니다. 0=중지 안 함.
nanobots-nano-fullfill-requests=item-request proxy를 처리하려고 시도합니다.
nanobots-active-emitter-mode=나노봇 동작을 위해 나노 방출기를 선택한 무기로 유지해야 합니다.
nanobots-log-level=로그 레벨 설정.\nOff - 로그 없음\nStandard - 중요 메시지만\nDebug - 전체 추적
nanobots-nano-repair=인벤토리의 수리 키트를 사용하여 손상된 엔티티를 자동 수리합니다.

nanobots-repair-start-threshold=엔티티 체력 비율이 이 값보다 낮을 때만 수리 시작(작은 손상 무시).
nanobots-repair-max-sessions=플레이어당 활성 수리 세션 최대 수.
nanobots-repair-hp-per-action=수리 1단계당 회복 HP.
nanobots-repair-requeue-delay=수리 단계 간격(틱).
nanobots-repair-throttle-ticks=같은 엔티티를 이 틱 수보다 자주 다시 검사하지 않음(0=해제).
nanobots-repair-combat-important-only=전투 중 중요한 대상만 수리(포탑/벽/문→레이더→지뢰→운송).
nanobots-repair-combat-enemy-radius=이 반경 내 적이 있으면 전투 중으로 간주.
nanobots-repair-combat-recent-damage-seconds=이 시간(초) 내 피해를 받으면 전투 중으로 간주.
nanobots-repair-cat-defense=포탑, 벽, 게이트, 레이더, 지뢰.
nanobots-repair-cat-transport=자동차, 스파이더트론, 기차/화차.
nanobots-repair-cat-power=전력 체인 전체(전기+증기/열/유체).
nanobots-repair-cat-production=조립기, 화로, 채굴기, 인서터, 로보포트, 연구소, 비콘.
nanobots-repair-cat-other=컨테이너/탱크 등 기타.

[string-mod-setting]
nanobots-log-level-off=끔
nanobots-log-level-standard=표준
nanobots-log-level-debug=디버그