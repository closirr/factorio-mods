[equipment-description]
equipment-bot-chip-items=개인 로보포트를 설정하여 바닥의 아이템을 자동으로 회수 대상으로 표시합니다. 사용 가능한 로봇이 있는 네트워크가 필요합니다. 근처에 적이 있으면 표시하지 않습니다.
equipment-bot-chip-trees=개인 로보포트를 설정하여 범위 내 나무를 자동으로 해체 대상으로 표시합니다. 사용 가능한 로봇이 있는 네트워크가 필요합니다. 근처에 적이 있으면 표시하지 않습니다.
equipment-bot-chip-launcher=적이 범위 내에 있을 때 인벤토리에서 전투 유닛을 자동 발사하도록 개인 로보포트를 설정합니다. 활성 개인 로보포트가 필요합니다.
equipment-bot-chip-feeder=비상 피더: 체력이 낮을 때 치유 아이템을 자동 사용합니다(30초 쿨다운). 치유 아이템이 없으면 10만큼 회복합니다. 개인 로보포트가 필요합니다.
equipment-bot-chip-nanointerface=물류 셀 내부에서도 나노봇이 작동하도록 합니다. 1개 칩만 필요합니다. 개인 로보포트/로봇이 없어도 작동합니다.

