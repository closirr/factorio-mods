[item-description]
gun-nano-emitter=나노 방출기가 선택된 무기인 동안, 탄종에 따라 미리 프로그램된 나노봇을 자동으로 보냅니다. 기존 물류 네트워크 내에서는 나노봇이 작동하지 않습니다.
ammo-nano-termites=범위 내 나무를 파괴합니다. 아이템을 돌려주지 않습니다.
ammo-nano-scrappers=범위 내 해체 표시된 엔티티를 파괴합니다. 아이템을 돌려주지 않습니다.
ammo-nano-deconstructors=범위 내 해체 표시된 엔티티를 해체합니다. 아이템을 반환합니다.
ammo-nano-constructors=인벤토리 아이템을 사용해 범위 내 유령 엔티티를 부활시킵니다. 손상된 엔티티도 수리합니다.
equipment-bot-chip-items=개인 로보포트를 설정하여 바닥의 아이템을 자동으로 회수 대상으로 표시합니다. 사용 가능한 로봇이 있는 네트워크가 필요합니다. 근처에 적이 있으면 표시하지 않습니다.
equipment-bot-chip-trees=개인 로보포트를 설정하여 범위 내 나무를 자동으로 해체 대상으로 표시합니다. 사용 가능한 로봇이 있는 네트워크가 필요합니다. 근처에 적이 있으면 표시하지 않습니다.
equipment-bot-chip-launcher=적이 범위 내에 있을 때 인벤토리에서 전투 유닛을 자동 발사하도록 개인 로보포트를 설정합니다. 개인 로보포트가 필요합니다.
equipment-bot-chip-feeder=비상 피더: 체력이 낮을 때 치유 아이템을 자동 사용합니다. 각 피더는 2분 쿨다운이 있습니다. 개인 로보포트가 필요합니다.
equipment-bot-chip-nanointerface=물류 셀 내부에서도 나노봇이 작동하도록 합니다. 1개 칩만 필요합니다.
roboport-interface-main=가장 가까운 물류 네트워크와 연동하여 작업을 할당합니다.

