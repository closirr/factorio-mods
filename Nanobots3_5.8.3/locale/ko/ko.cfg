[virtual-signal-name]
nano-signal-chop-trees=로보포트 인터페이스\n나무 해체 표시\n음수로 설정하면 네트워크에\n원목이 지정량이 될 때까지\n나무를 베어냅니다.
nano-signal-item-on-ground=로보포트 인터페이스\n바닥 아이템 표시
nano-signal-closest-roboport=로보포트 인터페이스\n범위 내 가장 가까운\n로보포트만 실행
nano-signal-deconstruct-finished-miners=로보포트 인터페이스\n채굴 완료 드릴 해체
nano-signal-landfill-the-world=로보포트 인터페이스\n모든 물을 매립\n음수로 설정하면 네트워크에\n매립을 지정량 유지합니다.
nano-signal-catch-fish=로보포트 인터페이스\n물고기 찾기\n물고기는 좋고, 물고기는 최고
nano-signal-build-tiles=로보포트 인터페이스\n타일 건설\n다음 신호로 타일 신호를 추가하여\n해당 타일을 건설\n음수로 설정하면 네트워크에\n지정량 이상 있을 때만 건설합니다.
nano-signal-smarter-charging=로보포트 인터페이스\n똑똑한 충전\n일부 로봇이 새 충전 지점을\n찾도록 주기적으로 강제합니다.
nano-signal-upgrade-modules=로보포트 인터페이스\n모듈 업그레이더\n낮은 등급 모듈을 높은 등급으로 교체합니다.
nano-signal-refill-turrets=로보포트 인터페이스\n포탑 탄약 보충\n양수로 설정하면 포탑에\n탄약을 채웁니다.

