[mod-setting-description]
nanobots-nanobots-auto=启用后纳米发射器自动工作。禁用则需要手动向区域发射纳米机器人。（尚未实现）
nanobots-network-limits=派出纳米机器人前检查是否存在物流网络。
nanobots-nano-poll-rate=每隔多少tick搜索纳米任务。每tick处理一个玩家。
nanobots-nano-queue-rate=队列动作之间的tick延迟。
nanobots-nano-queue-per-cycle=每周期最多入队实体数量。
nanobots-indside-area-radius=距离任务过远时取消任务。
nanobots-cell-queue-rate=机器人港接口队列检查间隔（tick）。
nanobots-free-bots-per=机器人港接口入队任务所需的可用建设机器人百分比。
nanobots-equipment-auto=启用后纳米装甲装备自动工作；禁用需手动激活。（尚未实现）
nanobots-nano-build-tiles=允许纳米机器人铺设地砖。
nanobots-afk-time=AFK超过该秒数后纳米机器人停止。0=永不停止。
nanobots-nano-fullfill-requests=纳米机器人会尝试满足 item-request proxy。
nanobots-active-emitter-mode=必须将纳米发射器作为当前选择武器才能工作。
nanobots-log-level=设置日志等级。\nOff - 关闭\nStandard - 仅重要信息\nDebug - 完整追踪
nanobots-nano-repair=纳米机器人使用背包中的修理包自动修理受损实体。

nanobots-repair-start-threshold=仅当实体生命比例低于该值时开始修理（忽略轻微损伤）。
nanobots-repair-max-sessions=每位玩家最大同时修理会话数量。
nanobots-repair-hp-per-action=每次修理步进恢复的HP数量。
nanobots-repair-requeue-delay=修理步进之间的tick延迟。
nanobots-repair-throttle-ticks=同一实体修理检查不超过该tick频率（0禁用）。
nanobots-repair-combat-important-only=战斗中仅修理重要目标（炮塔/墙/门→雷达→地雷→运输）。
nanobots-repair-combat-enemy-radius=该半径内有敌人则视为战斗中。
nanobots-repair-combat-recent-damage-seconds=该时间窗内受伤则视为战斗中。
nanobots-repair-cat-defense=炮塔、墙、门、雷达、地雷。
nanobots-repair-cat-transport=汽车、蜘蛛机甲、火车与车厢。
nanobots-repair-cat-power=完整供电链（电力+蒸汽/热/流体基础设施）。
nanobots-repair-cat-production=组装机、熔炉、采矿机、机械臂、机器人港、实验室、插件塔。
nanobots-repair-cat-other=箱子、储罐等其他实体。

[string-mod-setting]
nanobots-log-level-off=关闭
nanobots-log-level-standard=标准
nanobots-log-level-debug=调试