[item-description]
gun-nano-emitter=只要纳米发射器是当前选中武器，就会根据弹药类型自动派出预编程纳米机器人。纳米机器人无法在已有物流网络内工作。
ammo-nano-termites=摧毁范围内的树木。不返还物品。
ammo-nano-scrappers=摧毁范围内标记为拆除的实体。不返还物品。
ammo-nano-deconstructors=拆除范围内标记为拆除的实体。会把物品返还给你。
ammo-nano-constructors=使用背包中的物品在范围内复活实体幽灵。也会修理受损实体。
equipment-bot-chip-items=配置个人机器人港自动标记地面物品以拾取。需要有可用机器人且在网络中。附近有敌人时不会标记。
equipment-bot-chip-trees=配置个人机器人港自动标记范围内的树木以拆除。需要有可用机器人且在网络中。附近有敌人时不会标记。
equipment-bot-chip-launcher=配置个人机器人港在敌人进入范围时自动从背包发射战斗单位。需要个人机器人港。
equipment-bot-chip-feeder=紧急供给器：生命值较低时自动使用治疗物品；每个供给器有2分钟冷却。需要个人机器人港。
equipment-bot-chip-nanointerface=允许纳米机器人在物流单元内工作。只需要1个芯片。
roboport-interface-main=连接最近的物流网络以分配任务。

