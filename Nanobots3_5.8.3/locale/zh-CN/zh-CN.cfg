[virtual-signal-name]
nano-signal-chop-trees=机器人港接口\n标记树木拆除\n设为负数：仅砍树直到\n网络中有\n指定数量的原木。
nano-signal-item-on-ground=机器人港接口\n标记地面物品
nano-signal-closest-roboport=机器人港接口\n只在范围内\n最近的机器人港执行
nano-signal-deconstruct-finished-miners=机器人港接口\n拆除已枯竭的采矿机
nano-signal-landfill-the-world=机器人港接口\n用填埋覆盖所有水域\n设为负数：保留网络中\n指定数量的填埋
nano-signal-catch-fish=机器人港接口\n寻找所有鱼\n鱼很好，鱼很棒
nano-signal-build-tiles=机器人港接口\n铺设地砖\n将地砖信号作为下一个信号\n以铺设该类型地砖\n设为负数：仅当网络中\n至少有指定数量时铺设。
nano-signal-smarter-charging=机器人港接口\n更智能充电\n定期强制部分机器人\n寻找新的充电位置。
nano-signal-upgrade-modules=机器人港接口\n模块升级器\n用高等级模块替换\n低等级模块。
nano-signal-refill-turrets=机器人港接口\n补充炮塔\n设为正数：为炮塔\n补充弹药。

