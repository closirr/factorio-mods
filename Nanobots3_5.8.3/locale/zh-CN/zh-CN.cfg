[equipment-description]
equipment-bot-chip-items=配置个人机器人港自动标记地面物品以拾取。需要有可用机器人且在网络中。附近有敌人时不会标记。
equipment-bot-chip-trees=配置个人机器人港自动标记范围内的树木以拆除。需要有可用机器人且在网络中。附近有敌人时不会标记。
equipment-bot-chip-launcher=配置个人机器人港在敌人进入范围时自动从背包发射战斗单位。需要启用的个人机器人港。
equipment-bot-chip-feeder=紧急供给器：生命值较低时自动使用治疗物品；冷却30秒。若无治疗物品则恢复10点。需要个人机器人港。
equipment-bot-chip-nanointerface=允许纳米机器人在物流单元内工作。只需要1个芯片。即使没有个人机器人港或机器人也能工作。

