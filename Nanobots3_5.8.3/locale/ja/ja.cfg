[item-description]
gun-nano-emitter=ナノ・エミッターが選択中の武器である限り、弾薬タイプに応じて事前設定されたナノボットを自動的に送り出します。既存の物流ネットワーク内ではナノボットは動作しません。
ammo-nano-termites=範囲内の木を破壊します。アイテムは返しません。
ammo-nano-scrappers=範囲内の「解体」指定されたエンティティを破壊します。アイテムは返しません。
ammo-nano-deconstructors=範囲内の「解体」指定されたエンティティを解体します。アイテムを返します。
ammo-nano-constructors=インベントリ内のアイテムを使用して、範囲内のゴーストを復活させます。損傷したエンティティの修理も行います。
equipment-bot-chip-items=個人用ロボポートを設定し、地面のアイテムを自動的に回収対象としてマークします。利用可能なロボットがいるネットワークが必要です。敵が近くにいる場合はマークされません。
equipment-bot-chip-trees=個人用ロボポートを設定し、範囲内の木を自動的に解体対象としてマークします。利用可能なロボットがいるネットワークが必要です。敵が近くにいる場合はマークされません。
equipment-bot-chip-launcher=個人用ロボポートを設定し、敵が範囲内にいるときインベントリから戦闘ユニットを自動発進します。個人用ロボポートが必要です。
equipment-bot-chip-feeder=緊急フィーダー。体力が低いとき回復アイテムを自動使用します。各フィーダーは2分のクールダウンがあります。個人用ロボポートが必要です。
equipment-bot-chip-nanointerface=物流セル内でナノボットを動作させます。必要なのは1枚のみです。
roboport-interface-main=最寄りの物流ネットワークと連携してジョブを割り当てます。

