[virtual-signal-name]
nano-signal-chop-trees=ロボポート・インターフェース\n木を解体対象にマーク\n負の値にすると、ネットワーク内の\n原木が指定量になるまで\n木を伐採します。
nano-signal-item-on-ground=ロボポート・インターフェース\n地面のアイテムをマーク
nano-signal-closest-roboport=ロボポート・インターフェース\n範囲内で最も近い\nロボポートのみ実行
nano-signal-deconstruct-finished-miners=ロボポート・インターフェース\n掘り尽くした採掘機を解体
nano-signal-landfill-the-world=ロボポート・インターフェース\n水域を埋め立て\n負の値にすると、ネットワーク内に\n指定量の埋め立てを保持します。
nano-signal-catch-fish=ロボポート・インターフェース\n魚を探す\n魚は良い、魚は素晴らしい
nano-signal-build-tiles=ロボポート・インターフェース\n床タイル建設\n次の信号にタイル信号を追加して\nその種類のタイルを建設\n負の値にすると、ネットワーク内に\n指定数以上ある場合のみ建設します。
nano-signal-smarter-charging=ロボポート・インターフェース\n賢い充電\n定期的に一部のロボットに\n新しい充電スポットを探させます。
nano-signal-upgrade-modules=ロボポート・インターフェース\nモジュールアップグレード\n低Tierモジュールを高Tierに交換します。
nano-signal-refill-turrets=ロボポート・インターフェース\nタレット補給\n正の値でタレットに弾薬を補給します。

