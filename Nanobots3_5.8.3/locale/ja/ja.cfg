[equipment-description]
equipment-bot-chip-items=個人用ロボポートを設定し、地面のアイテムを自動的に回収対象としてマークします。利用可能なロボットがいるネットワークが必要です。敵が近くにいる場合はマークされません。
equipment-bot-chip-trees=個人用ロボポートを設定し、範囲内の木を自動的に解体対象としてマークします。利用可能なロボットがいるネットワークが必要です。敵が近くにいる場合はマークされません。
equipment-bot-chip-launcher=個人用ロボポートを設定し、敵が範囲内にいるときインベントリから戦闘ユニットを自動発進します。アクティブな個人用ロボポートが必要です。
equipment-bot-chip-feeder=緊急フィーダー。体力が低いとき回復アイテムを自動使用します（30秒クールダウン）。回復アイテムがない場合は10回復します。個人用ロボポートが必要です。
equipment-bot-chip-nanointerface=物流セル内でナノボットを動作させます。必要なのは1枚のみです。個人用ロボポートやロボットがなくても動作します。

