[mod-setting-description]
nanobots-nanobots-auto=有効ならナノ・エミッターは自動で動作します。無効なら手動で発射が必要です。（未実装）
nanobots-network-limits=既存の物流ネットワークがある場合、ナノボットの派遣を制限します。
nanobots-nano-poll-rate=ナノボットの注文を検索する頻度（ティック）。毎ティック1人のプレイヤーを処理します。
nanobots-nano-queue-rate=キュー動作間の遅延（ティック）。
nanobots-nano-queue-per-cycle=1サイクルでキューに入れる最大数。
nanobots-indside-area-radius=キュー対象からこの距離を超えるとタスクをキャンセルします。
nanobots-cell-queue-rate=ロボポート・インターフェースのチェック間隔（ティック）。
nanobots-free-bots-per=ロボポート・インターフェースがタスクをキューするために必要な空き建設ロボット割合。
nanobots-equipment-auto=有効なら装備が自動で動作します。無効なら手動で有効化が必要です。（未実装）
nanobots-nano-build-tiles=ナノボットでタイル建設を可能にします。
nanobots-afk-time=AFKがこの秒数を超えるとナノボットが停止します。0=停止しない。
nanobots-nano-fullfill-requests=item-request proxy（要求）を満たそうとします。
nanobots-active-emitter-mode=ナノ・エミッターを選択中の武器にする必要があります。
nanobots-log-level=ログレベル。\nOff - なし\nStandard - 重要のみ\nDebug - 詳細
nanobots-nano-repair=インベントリの修理キットで損傷したエンティティを自動修理します。

nanobots-repair-start-threshold=この値より体力比が低い場合のみ修理開始（小さい傷は無視）。
nanobots-repair-max-sessions=プレイヤー毎の同時修理セッション上限。
nanobots-repair-hp-per-action=修理1ステップあたりの回復HP。
nanobots-repair-requeue-delay=修理ステップの間隔（ティック）。
nanobots-repair-throttle-ticks=同じエンティティをこのティック数より頻繁に再チェックしない（0で無効）。
nanobots-repair-combat-important-only=戦闘中は重要対象のみ修理（タレット/壁/ゲート→レーダー→地雷→輸送）。
nanobots-repair-combat-enemy-radius=この半径内に敵がいると戦闘中とみなします。
nanobots-repair-combat-recent-damage-seconds=この秒数内に被ダメすると戦闘中とみなします。
nanobots-repair-cat-defense=タレット、壁、ゲート、レーダー、地雷。
nanobots-repair-cat-transport=車、スパイダートロン、列車、貨車。
nanobots-repair-cat-power=電力チェーン全体（電気＋蒸気/熱/流体）。
nanobots-repair-cat-production=組立機、炉、採掘機、インサータ、ロボポート、研究所、ビーコン。
nanobots-repair-cat-other=コンテナ等のその他。

