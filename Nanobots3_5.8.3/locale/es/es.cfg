[item-description]
gun-nano-emitter=Envía automáticamente nanobots preprogramados según el tipo de munición, siempre que el emisor nano sea el arma seleccionada. Los nanobots no funcionan dentro de redes logísticas existentes.
ammo-nano-termites=Destruye árboles dentro del alcance. No devuelve objetos.
ammo-nano-scrappers=Destruye entidades marcadas para desmantelar dentro del alcance. No devuelve objetos.
ammo-nano-deconstructors=Desmantela entidades marcadas para desmantelar dentro del alcance. Devuelve los objetos.
ammo-nano-constructors=Reanima fantasmas de entidades dentro del alcance usando objetos del inventario. También repara entidades dañadas.
equipment-bot-chip-items=Configura roboports personales para marcar automáticamente objetos en el suelo para recoger. Debe estar en una red con robots disponibles. No marca objetos si hay enemigos cerca.
equipment-bot-chip-trees=Configura roboports personales para marcar automáticamente árboles dentro del alcance para desmantelar. Debe estar en una red con robots disponibles. No marca si hay enemigos cerca.
equipment-bot-chip-launcher=Configura roboports personales para lanzar automáticamente unidades de combate desde el inventario cuando los enemigos están dentro del alcance. Requiere un roboport personal.
equipment-bot-chip-feeder=Alimentador de emergencia: usa automáticamente objetos de curación cuando tu salud es baja; cada alimentador tiene 2 minutos de enfriamiento. Requiere un roboport personal.
equipment-bot-chip-nanointerface=Permite a los nanobots trabajar dentro de celdas logísticas. Solo se necesita 1 chip.
roboport-interface-main=Se conecta a la red logística más cercana para asignar trabajos.

