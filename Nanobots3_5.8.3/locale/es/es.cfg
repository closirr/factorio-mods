[equipment-description]
equipment-bot-chip-items=Configura roboports personales para marcar automáticamente objetos en el suelo para recoger. Debe estar en una red con robots disponibles. No marca objetos si hay enemigos cerca.
equipment-bot-chip-trees=Configura roboports personales para marcar automáticamente árboles dentro del alcance para desmantelar. Debe estar en una red con robots disponibles. No marca si hay enemigos cerca.
equipment-bot-chip-launcher=Configura roboports personales para lanzar automáticamente unidades de combate desde el inventario cuando los enemigos están dentro del alcance. Requiere un roboport personal activo.
equipment-bot-chip-feeder=Alimentador de emergencia: usa automáticamente objetos de curación cuando tu salud es baja; 30 segundos de enfriamiento. Si no hay objetos de curación, cura 10 puntos. Requiere un roboport personal.
equipment-bot-chip-nanointerface=Permite a los nanobots trabajar dentro de celdas logísticas. Solo se necesita 1 chip. Funciona incluso sin roboport personal ni bots.

