nano-signal-chop-trees=Interfaz de roboport\nMarcar árboles para desmantelar\nPoner en negativo para talar árboles\nhasta que haya\nesa cantidad de madera en la red.
nano-signal-item-on-ground=Interfaz de roboport\nMarcar objetos en el suelo
nano-signal-closest-roboport=Interfaz de roboport\nEjecutar señales solo en el\nroboport más cercano dentro del alcance
nano-signal-deconstruct-finished-miners=Interfaz de roboport\nDesmantelar mineros terminados
nano-signal-landfill-the-world=Interfaz de roboport\nRellenar toda el agua con tierra\nPoner en negativo para mantener\nesa cantidad de tierra en la red
nano-signal-catch-fish=Interfaz de roboport\nEncontrar todos los peces\nLos peces son buenos, los peces son geniales
nano-signal-build-tiles=Interfaz de roboport\nConstruir baldosas\nAñade una señal de baldosa como\nsiguiente señal para construir ese tipo\nPoner en negativo para construir solo\nsi hay al menos\nesa cantidad en la red.
nano-signal-smarter-charging=Interfaz de roboport\nCarga más inteligente\nPeriódicamente fuerza a algunos robots\na buscar nuevos puntos de carga.
nano-signal-upgrade-modules=Interfaz de roboport\nMejorador de módulos\nCambia módulos de nivel inferior\npor versiones de nivel superior.
nano-signal-refill-turrets=Interfaz de roboport\nRellenar torretas\nPoner en positivo para llenar torretas\ncon munición.

