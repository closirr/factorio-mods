[mod-setting-description]
nanobots-nanobots-auto=Si está activado, el emisor nano funciona automáticamente. Si se desactiva, tendrás que disparar nanobots manualmente en un área. (Aún no disponible)
nanobots-network-limits=Comprueba redes logísticas existentes antes de enviar nanobots.
nanobots-nano-poll-rate=Cada cuántos ticks se buscan órdenes de nanobots. Se procesa un jugador por tick.
nanobots-nano-queue-rate=Retraso en ticks entre acciones de cola.
nanobots-nano-queue-per-cycle=Número máximo de entidades en cola por ciclo.
nanobots-indside-area-radius=Qué tan lejos puedes estar de una entidad en cola antes de que se cancele.
nanobots-cell-queue-rate=Retraso en ticks entre comprobaciones de roboports en cola por la interfaz.
nanobots-free-bots-per=Porcentaje de robots de construcción disponibles requerido para que la interfaz ponga tareas en cola.
nanobots-equipment-auto=Si está activado, el equipo de la nano-armadura funciona automáticamente. Si se desactiva, debes activarlo manualmente. (Aún no disponible)
nanobots-nano-build-tiles=Permite a los nanobots construir baldosas.
nanobots-afk-time=Cuánto tiempo (en segundos) puedes estar AFK antes de que los nanobots se apaguen. 0 = nunca se apagan.
nanobots-nano-fullfill-requests=Los nanobots intentarán completar item-request proxies.
nanobots-active-emitter-mode=El emisor nano debe ser el arma seleccionada para que los nanobots funcionen.
nanobots-log-level=Configura el nivel de registro.\nOff - sin registro\nStandard - solo mensajes importantes\nDebug - trazado completo
nanobots-nano-repair=Los nanobots repararán automáticamente entidades dañadas usando repair packs del inventario.

nanobots-repair-start-threshold=Iniciar reparaciones solo cuando la proporción de vida de la entidad esté por debajo de este valor (ignora daños menores).
nanobots-repair-max-sessions=Número máximo de sesiones de reparación activas por jugador.
nanobots-repair-hp-per-action=Cuántos HP se reparan por cada paso de reparación.
nanobots-repair-requeue-delay=Retraso en ticks entre pasos de reparación.
nanobots-repair-throttle-ticks=No volver a revisar la misma entidad para reparar más a menudo que este número de ticks (0 desactiva).
nanobots-repair-combat-important-only=En combate, reparar solo objetivos importantes (torretas/muros/puertas → radar → minas → transporte).
nanobots-repair-combat-enemy-radius=Si hay un enemigo en este radio, el jugador se considera “en combate”.
nanobots-repair-combat-recent-damage-seconds=Si el jugador recibió daño dentro de esta ventana de tiempo, se considera “en combate”.
nanobots-repair-cat-defense=Torretas, muros, puertas, radar, minas.
nanobots-repair-cat-transport=Coches, spidertrons, trenes y vagones.
nanobots-repair-cat-power=Cadena completa de energía (electricidad + vapor/calor/fluidos).
nanobots-repair-cat-production=Ensambladoras, hornos, minas, insertadores, roboports, laboratorios, balizas.
nanobots-repair-cat-other=Contenedores, tanques y otras entidades.

[string-mod-setting]
nanobots-log-level-off=Off
nanobots-log-level-standard=Standard
nanobots-log-level-debug=Debug