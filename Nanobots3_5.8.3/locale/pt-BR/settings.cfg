[mod-setting-description]
nanobots-nanobots-auto=Se ativado, o emissor nano funciona automaticamente. Se desativado, você precisa atirar nanobots manualmente em uma área. (Ainda não disponível)
nanobots-network-limits=Verifica redes logísticas existentes antes de enviar nanobots.
nanobots-nano-poll-rate=Com que frequência (em ticks) procurar ordens de nanobots. Um jogador é processado por tick.
nanobots-nano-queue-rate=Atraso em ticks entre ações da fila.
nanobots-nano-queue-per-cycle=Número máximo de entidades enfileiradas por ciclo.
nanobots-indside-area-radius=Distância máxima antes de cancelar uma entidade enfileirada.
nanobots-cell-queue-rate=Atraso em ticks entre verificações de roboports enfileirados pela interface.
nanobots-free-bots-per=Percentual de robôs de construção disponíveis necessário para a interface enfileirar ações.
nanobots-equipment-auto=Se ativado, o equipamento da armadura nano funciona automaticamente. Se desativado, requer ativação manual. (Ainda não disponível)
nanobots-nano-build-tiles=Permite que nanobots construam pisos.
nanobots-afk-time=Quanto tempo (em segundos) você pode ficar AFK antes de os nanobots desligarem. 0 = nunca desligar.
nanobots-nano-fullfill-requests=Nanobots tentarão atender item-request proxies.
nanobots-active-emitter-mode=O emissor nano deve ser a arma selecionada para os nanobots operarem.
nanobots-log-level=Define o nível de log.\nOff - sem log\nStandard - apenas mensagens importantes\nDebug - rastreamento completo
nanobots-nano-repair=Nanobots repararão automaticamente entidades danificadas usando kits de reparo do inventário.

nanobots-repair-start-threshold=Inicia reparos somente quando a proporção de vida estiver abaixo deste valor (ignora danos leves).
nanobots-repair-max-sessions=Número máximo de sessões de reparo ativas por jogador.
nanobots-repair-hp-per-action=Quantos HP são reparados por passo.
nanobots-repair-requeue-delay=Atraso em ticks entre passos de reparo.
nanobots-repair-throttle-ticks=Não verificar a mesma entidade para reparo com mais frequência que este número de ticks (0 desativa).
nanobots-repair-combat-important-only=Em combate, reparar apenas alvos importantes (torres/muros/portões → radar → minas → transporte).
nanobots-repair-combat-enemy-radius=Se houver inimigos neste raio, o jogador é considerado “em combate”.
nanobots-repair-combat-recent-damage-seconds=Se o jogador recebeu dano nesta janela de tempo, é considerado “em combate”.
nanobots-repair-cat-defense=Torres, muros, portões, radar, minas.
nanobots-repair-cat-transport=Carros, spidertrons, trens e vagões.
nanobots-repair-cat-power=Cadeia completa de energia (eletricidade + vapor/calor/fluidos).
nanobots-repair-cat-production=Montadoras, fornos, mineradores, inseridores, roboports, laboratórios, beacons.
nanobots-repair-cat-other=Contêineres, tanques e outras entidades.

[string-mod-setting]
nanobots-log-level-off=Off
nanobots-log-level-standard=Standard
nanobots-log-level-debug=Debug