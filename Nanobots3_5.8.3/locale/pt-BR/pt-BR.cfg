[item-description]
gun-nano-emitter=Envia automaticamente nanobots pré-programados conforme o tipo de munição, desde que o emissor nano esteja selecionado como arma atual. Nanobots não funcionam dentro de redes logísticas existentes.
ammo-nano-termites=Destrói árvores no alcance. Não retorna itens.
ammo-nano-scrappers=Destrói entidades marcadas para desmontagem no alcance. Não retorna itens.
ammo-nano-deconstructors=Desmonta entidades marcadas para desmontagem no alcance. Retorna os itens para você.
ammo-nano-constructors=Revive fantasmas de entidades no alcance usando itens do seu inventário. Também repara entidades danificadas.
equipment-bot-chip-items=Configura roboports pessoais para marcar automaticamente itens no chão para coleta. Precisa estar em uma rede com robôs disponíveis. Itens não são marcados se houver inimigos por perto.
equipment-bot-chip-trees=Configura roboports pessoais para marcar automaticamente árvores no alcance para desmontagem. Precisa estar em uma rede com robôs disponíveis. Árvores não são marcadas se houver inimigos por perto.
equipment-bot-chip-launcher=Configura roboports pessoais para iniciar automaticamente o lançamento de unidades de combate do inventário quando inimigos estiverem no alcance. Requer um roboport pessoal.
equipment-bot-chip-feeder=Alimentador de emergência: usa automaticamente itens de cura quando sua vida está baixa; cada alimentador tem 2 minutos de recarga. Requer um roboport pessoal.
equipment-bot-chip-nanointerface=Permite que nanobots funcionem dentro de células logísticas. Apenas 1 chip é necessário.
roboport-interface-main=Integra-se à rede logística mais próxima para atribuir tarefas.

