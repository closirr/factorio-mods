[equipment-description]
equipment-bot-chip-items=Configura roboports pessoais para marcar automaticamente itens no chão para coleta. Precisa estar em uma rede com robôs disponíveis. Itens não são marcados se houver inimigos por perto.
equipment-bot-chip-trees=Configura roboports pessoais para marcar automaticamente árvores no alcance para desmontagem. Precisa estar em uma rede com robôs disponíveis. Árvores não são marcadas se houver inimigos por perto.
equipment-bot-chip-launcher=Configura roboports pessoais para iniciar automaticamente o lançamento de unidades de combate do inventário quando inimigos estiverem no alcance. Requer um roboport pessoal ativo.
equipment-bot-chip-feeder=Alimentador de emergência: usa automaticamente itens de cura quando sua vida está baixa; recarga de 30 segundos. Se não houver itens de cura, cura 10 pontos. Requer um roboport pessoal.
equipment-bot-chip-nanointerface=Permite que nanobots funcionem dentro de células logísticas. Apenas 1 chip é necessário. Funciona mesmo sem roboport pessoal ou robôs.

