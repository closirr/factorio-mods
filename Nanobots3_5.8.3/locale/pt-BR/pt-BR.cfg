[virtual-signal-name]
nano-signal-chop-trees=Interface do Roboport\nMarcar árvores para desmontagem\nDefina um valor negativo para cortar árvores\naté que haja\nessa quantidade de madeira bruta na rede.
nano-signal-item-on-ground=Interface do Roboport\nMarcar itens no chão
nano-signal-closest-roboport=Interface do Roboport\nExecutar sinais apenas no roboport\nmais próximo dentro do alcance
nano-signal-deconstruct-finished-miners=Interface do Roboport\nDesmontar mineradores esgotados
nano-signal-landfill-the-world=Interface do Roboport\nPreencher toda a água com aterro\nDefina um valor negativo para manter\nessa quantidade de aterro na rede
nano-signal-catch-fish=Interface do Roboport\nEncontrar todos os peixes\nPeixes são bons, peixes são ótimos
nano-signal-build-tiles=Interface do Roboport\nConstruir pisos\nAdicione um sinal de piso como o próximo\nsinal para construir aquele tipo\nDefina um valor negativo para construir apenas\nse houver pelo menos\nessa quantidade na rede.
nano-signal-smarter-charging=Interface do Roboport\nRecarga mais inteligente\nPeriodicamente força alguns robôs\na procurar novos pontos de recarga.
nano-signal-upgrade-modules=Interface do Roboport\nAtualizador de módulos\nTroca módulos de nível inferior\npor versões de nível superior.
nano-signal-refill-turrets=Interface do Roboport\nReabastecer torres\nDefina um valor positivo para encher torres\ncom munição.

