[mod-setting-description]
nanobots-nanobots-auto=Jeśli włączone, emiter nano działa automatycznie. Jeśli wyłączone, trzeba ręcznie “strzelać” nanobotami w obszar. (Jeszcze niedostępne)
nanobots-network-limits=Sprawdza istniejące sieci logistyczne przed wysłaniem nanobotów.
nanobots-nano-poll-rate=Jak często (w tikach) szuka zleceń nanobotów. Co tik przetwarza jednego gracza.
nanobots-nano-queue-rate=Opóźnienie w tikach między akcjami kolejki.
nanobots-nano-queue-per-cycle=Maksymalna liczba encji dodawanych do kolejki na cykl.
nanobots-indside-area-radius=Jak daleko możesz być od zadania w kolejce, zanim zostanie anulowane.
nanobots-cell-queue-rate=Opóźnienie w tikach między sprawdzaniem roboportów kolejkowanych przez interfejs.
nanobots-free-bots-per=Procent dostępnych robotów budowlanych wymagany, aby interfejs mógł kolejkować zadania.
nanobots-equipment-auto=Jeśli włączone, wyposażenie nano działa automatycznie. Jeśli wyłączone, wymaga ręcznej aktywacji. (Jeszcze niedostępne)
nanobots-nano-build-tiles=Pozwala nanobotom budować płytki.
nanobots-afk-time=Ile sekund AFK zanim nanoboty się wyłączą. 0 = nigdy.
nanobots-nano-fullfill-requests=Nanoboty spróbują wypełniać item-request proxy.
nanobots-active-emitter-mode=Emiter nano musi być wybraną bronią, aby nanoboty działały.
nanobots-log-level=Ustaw poziom logów.\nOff - brak\nStandard - tylko ważne\nDebug - pełne śledzenie
nanobots-nano-repair=Nanoboty automatycznie naprawiają uszkodzone encje, używając zestawów naprawczych z ekwipunku.

nanobots-repair-start-threshold=Zaczynaj naprawę tylko gdy proporcja zdrowia encji jest poniżej tej wartości (ignoruje drobne uszkodzenia).
nanobots-repair-max-sessions=Maksymalna liczba aktywnych sesji napraw na gracza.
nanobots-repair-hp-per-action=Ile HP naprawia się na jeden krok naprawy.
nanobots-repair-requeue-delay=Opóźnienie w tikach między krokami naprawy.
nanobots-repair-throttle-ticks=Nie sprawdzaj tej samej encji częściej niż co tyle tików (0 wyłącza).
nanobots-repair-combat-important-only=W walce naprawiaj tylko ważne cele (wieżyczki/ściany/bramy → radar → miny → transport).
nanobots-repair-combat-enemy-radius=Jeśli wróg jest w tym promieniu, gracz jest “w walce”.
nanobots-repair-combat-recent-damage-seconds=Jeśli gracz otrzymał obrażenia w tym oknie czasu, jest “w walce”.
nanobots-repair-cat-defense=Wieżyczki, ściany, bramy, radar, miny.
nanobots-repair-cat-transport=Samochody, spidertrony, pociągi i wagony.
nanobots-repair-cat-power=Pełny łańcuch energii (elektryka + para/ciepło/płyny).
nanobots-repair-cat-production=Assembler, piece, wiertnice, insertery, roboporty, laboratoria, beacony.
nanobots-repair-cat-other=Pojemniki, zbiorniki i inne encje.

