[entity-description]
roboport-interface-main=Łączy się z najbliższą siecią logistyczną, aby przydzielać zadania.
roboport-interface-cc=Ustaw sygnały, aby dać bezczynnym robotom specjalne zadania. Surowe drewno = ścinanie drzew, płytka = budowa płytek. Zobacz dokumentację po przykłady.
roboport-interface-scanner=Skanuje sieć i raportuje dostępne zadania.

