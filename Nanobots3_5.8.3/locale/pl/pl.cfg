[item-description]
gun-nano-emitter=Automatycznie wysyła zaprogramowane nanoboty w zależności od typu amunicji, o ile emiter nano jest aktualnie wybraną bronią. Nanoboty nie działają w istniejących sieciach logistycznych.
ammo-nano-termites=Niszczy drzewa w zasięgu. Nie zwraca przedmiotów.
ammo-nano-scrappers=Niszczy obiekty oznaczone do rozbiórki w zasięgu. Nie zwraca przedmiotów.
ammo-nano-deconstructors=Rozbiera obiekty oznaczone do rozbiórki w zasięgu. Zwraca przedmioty do gracza.
ammo-nano-constructors=Wskrzesza duchy obiektów w zasięgu, używając przedmiotów z ekwipunku. Naprawia również uszkodzone obiekty.
equipment-bot-chip-items=Konfiguruje osobiste roboporty, aby automatycznie oznaczały przedmioty na ziemi do podniesienia. Wymaga sieci z dostępnymi robotami. Przedmioty nie są oznaczane, jeśli w pobliżu są wrogowie.
equipment-bot-chip-trees=Konfiguruje osobiste roboporty, aby automatycznie oznaczały drzewa w zasięgu do rozbiórki. Wymaga sieci z dostępnymi robotami. Nie działa, jeśli w pobliżu są wrogowie.
equipment-bot-chip-launcher=Konfiguruje osobiste roboporty, aby automatycznie wypuszczały jednostki bojowe z ekwipunku, gdy wrogowie są w zasięgu. Wymaga osobistego roboportu.
equipment-bot-chip-feeder=Awaryjny podajnik: automatycznie używa przedmiotów leczniczych przy niskim zdrowiu; każdy ma 2 minuty odnowienia. Wymaga osobistego roboportu.
equipment-bot-chip-nanointerface=Pozwala nanobotom działać w komórkach logistycznych. Wystarczy 1 chip.
roboport-interface-main=Łączy się z najbliższą siecią logistyczną, aby przydzielać zadania.

