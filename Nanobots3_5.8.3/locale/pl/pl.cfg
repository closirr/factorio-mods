[virtual-signal-name]
nano-signal-chop-trees=Interfejs roboportu\nOznacz drzewa do rozbiórki\nUstaw wartość ujemną, aby ciąć drzewa\naż w sieci będzie\ntyle surowego drewna.
nano-signal-item-on-ground=Interfejs roboportu\nOznacz przedmioty na ziemi
nano-signal-closest-roboport=Interfejs roboportu\nUruchamiaj sygnały tylko na\nnajbliższym roboportcie w zasięgu
nano-signal-deconstruct-finished-miners=Interfejs roboportu\nRozbierz zużyte wiertnice
nano-signal-landfill-the-world=Interfejs roboportu\nZasyp całą wodę ziemią\nUjemna wartość: zachowaj w sieci\ntyle ziemi
nano-signal-catch-fish=Interfejs roboportu\nZnajdź wszystkie ryby\nRyby są dobre, ryby są świetne
nano-signal-build-tiles=Interfejs roboportu\nBuduj płytki\nDodaj sygnał płytki jako następny\naby budować ten typ\nUjemna wartość: buduj tylko,\ngdy w sieci jest co najmniej\ntyle sztuk.
nano-signal-smarter-charging=Interfejs roboportu\nSprytniejsze ładowanie\nOkresowo zmusza część robotów\ndo szukania nowych miejsc ładowania.
nano-signal-upgrade-modules=Interfejs roboportu\nUlepszacz modułów\nZamienia moduły niższego poziomu\nna wyższe.
nano-signal-refill-turrets=Interfejs roboportu\nUzupełnij wieżyczki\nUstaw wartość dodatnią, aby\nuzupełniać amunicję.

