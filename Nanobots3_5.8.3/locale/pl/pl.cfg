[equipment-description]
equipment-bot-chip-items=Konfiguruje osobiste roboporty, aby automatycznie oznaczały przedmioty na ziemi do podniesienia. Wymaga sieci z dostępnymi robotami. Przedmioty nie są oznaczane, jeśli w pobliżu są wrogowie.
equipment-bot-chip-trees=Konfiguruje osobiste roboporty, aby automatycznie oznaczały drzewa w zasięgu do rozbiórki. Wymaga sieci z dostępnymi robotami. Nie działa, jeśli w pobliżu są wrogowie.
equipment-bot-chip-launcher=Konfiguruje osobiste roboporty, aby automatycznie wypuszczały jednostki bojowe z ekwipunku, gdy wrogowie są w zasięgu. Wymaga aktywnego osobistego roboportu.
equipment-bot-chip-feeder=Awaryjny podajnik: automatycznie używa przedmiotów leczniczych przy niskim zdrowiu; odnowienie 30 sekund. Jeśli brak przedmiotów leczniczych, leczy 10 punktów. Wymaga osobistego roboportu.
equipment-bot-chip-nanointerface=Pozwala nanobotom działać w komórkach logistycznych. Wystarczy 1 chip. Działa nawet bez osobistego roboportu lub robotów.

