[mod-setting-description]
nanobots-auto-defense-threshold=When turret ammo falls below this threshold, refill will be triggered.
nanobots-auto-defense-delivery=How much ammunition to deliver to the turret.
nanobots-auto-defense-artillery-threshold=Artillery-specific threshold.
nanobots-auto-defense-artillery-delivery=Artillery-specific delivery amount.
nanobots-auto-defense-gun-turrets=Automatically refill gun turrets.
nanobots-auto-defense-artillery-turrets=Automatically refill artillery turrets.
nanobots-auto-defense-modded-turrets=Automatically refill rocket turrets, railgun turrets, and modded ammo turrets. Detected by entity type (ammo-turret, artillery-turret).
nanobots-auto-defense-ammo-type-priority=Which ammunition type to use first when multiple types are available. Used in peace mode (or always if Combat Mode disabled).
nanobots-auto-defense-ammo-quality-priority=Which quality to use first when same ammo type has multiple qualities. Used in peace mode (or always if Combat Mode disabled).
nanobots-auto-defense-warning-interval=How often to show warnings when a TURRET cannot be resupplied (no compatible ammo). 30-300 sec.
nanobots-auto-defense-scan-interval=Base scan interval (60 ticks = 1 second). With Adaptive Scan: halved in combat, 1.5x in peacetime.
nanobots-auto-defense-max-per-tick=Maximum turrets to process per scan.
nanobots-auto-defense-combat-mode=Auto-switch ammo priority based on enemy presence. IN COMBAT: always best ammo. IN PEACE: uses your Ammo Priority settings below. Disable to always use manual settings.
nanobots-auto-defense-auto-enable-combat=Automatically ENABLE the delivery system when enemies are nearby, and DISABLE when peaceful. Different from Combat Priority Mode which only changes WHICH ammo to use.
nanobots-auto-defense-adaptive-scan=Scan faster when enemies are nearby (2x speed), slower in peacetime (1.5x interval). Saves UPS during quiet periods.
nanobots-auto-defense-show-projectile=Show a visual projectile flying from player to turret on each ammo delivery. Disable for better performance on megabases.
nanobots-auto-defense-low-nano-threshold=When nano-emitter ammo drops to this count, show a warning with sound. Set to 0 to disable.
nanobots-low-nano-warning-interval=How often to repeat the warning when NANO CHARGES are running low (flying text). 30 sec to 5 min.
nanobots-wrong-ammo-warning-interval=How often to warn that Auto-Defense is paused because non-constructor ammo (e.g. termites) is loaded. Set to 0 to disable.
nanobots-log-level=Set logging detail level for ALL systems. 'off' = no logs, 'standard' = basic info, 'debug' = detailed info. Use checkboxes below to control which systems show logs.
nanobots-debug-repair-system=Show logs for repair and construction system. [font=default-semibold]Requires Log Level ≥ 'standard'[/font]
nanobots-debug-defense-system=Show logs for auto-defense ammunition delivery. [font=default-semibold]Requires Log Level ≥ 'standard'[/font]

