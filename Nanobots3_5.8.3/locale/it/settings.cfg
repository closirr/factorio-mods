[mod-setting-description]
nanobots-nanobots-auto=Se attivo, l’emettitore nano funziona automaticamente. Se disattivo, dovrai sparare i nanobots manualmente in un’area. (Non ancora disponibile)
nanobots-network-limits=Controlla reti logistiche esistenti prima di inviare nanobots.
nanobots-nano-poll-rate=Ogni quanti tick cercare ordini nanobot. Un giocatore viene processato per tick.
nanobots-nano-queue-rate=Ritardo in tick tra azioni della coda.
nanobots-nano-queue-per-cycle=Numero massimo di entità messe in coda per ciclo.
nanobots-indside-area-radius=Distanza massima prima che un’azione in coda venga annullata.
nanobots-cell-queue-rate=Ritardo in tick tra controlli dei roboport messi in coda dall’interfaccia.
nanobots-free-bots-per=Percentuale di robot da costruzione disponibili richiesta per mettere azioni in coda dall’interfaccia.
nanobots-equipment-auto=Se attivo, l’equipaggiamento dell’armatura nano funziona automaticamente. Se disattivo, va attivato manualmente. (Non ancora disponibile)
nanobots-nano-build-tiles=Permette ai nanobots di costruire piastrelle.
nanobots-afk-time=Tempo (in secondi) di AFK prima che i nanobots si spengano. 0 = mai.
nanobots-nano-fullfill-requests=I nanobots proveranno a soddisfare gli item-request proxy.
nanobots-active-emitter-mode=L’emettitore nano deve essere l’arma selezionata perché i nanobots funzionino.
nanobots-log-level=Imposta il livello di log.\nOff - nessun log\nStandard - solo messaggi importanti\nDebug - tracciamento completo
nanobots-nano-repair=I nanobots riparano automaticamente le entità danneggiate usando i repair pack dall’inventario.

nanobots-repair-start-threshold=Avvia la riparazione solo quando il rapporto salute è sotto questo valore (ignora piccoli danni).
nanobots-repair-max-sessions=Numero massimo di sessioni di riparazione attive per giocatore.
nanobots-repair-hp-per-action=Quanti HP vengono riparati per ogni passo.
nanobots-repair-requeue-delay=Ritardo in tick tra i passi di riparazione.
nanobots-repair-throttle-ticks=Non ricontrollare la stessa entità più spesso di questi tick (0 disabilita).
nanobots-repair-combat-important-only=In combattimento ripara solo obiettivi importanti (torrette/muri/cancelli → radar → mine → trasporto).
nanobots-repair-combat-enemy-radius=Se un nemico è entro questo raggio, il giocatore è considerato “in combattimento”.
nanobots-repair-combat-recent-damage-seconds=Se il giocatore ha subito danni entro questa finestra, è considerato “in combattimento”.
nanobots-repair-cat-defense=Torrette, muri, cancelli, radar, mine.
nanobots-repair-cat-transport=Auto, spidertron, treni e vagoni.
nanobots-repair-cat-power=Catena completa energia (elettricità + vapore/calore/fluidi).
nanobots-repair-cat-production=Assemblatori, fornaci, trivelle, inseritori, roboport, laboratori, beacon.
nanobots-repair-cat-other=Contenitori, serbatoi e altre entità.

[string-mod-setting]
nanobots-log-level-off=Off
nanobots-log-level-standard=Standard
nanobots-log-level-debug=Debug