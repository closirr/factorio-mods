[equipment-description]
equipment-bot-chip-items=Configura i roboport personali per contrassegnare automaticamente gli oggetti a terra per la raccolta. Deve essere in una rete con robot disponibili. Gli oggetti non vengono contrassegnati se ci sono nemici nelle vicinanze.
equipment-bot-chip-trees=Configura i roboport personali per contrassegnare automaticamente gli alberi nel raggio per lo smantellamento. Deve essere in una rete con robot disponibili. Gli oggetti non vengono contrassegnati se ci sono nemici nelle vicinanze.
equipment-bot-chip-launcher=Configura i roboport personali per lanciare automaticamente unità da combattimento dall’inventario quando i nemici sono nel raggio. Richiede un roboport personale attivo.
equipment-bot-chip-feeder=Dispositivo di emergenza: usa automaticamente oggetti di cura quando la tua salute è bassa; cooldown 30 secondi. Se non ci sono oggetti di cura, cura di 10 punti. Richiede un roboport personale.
equipment-bot-chip-nanointerface=Consente ai nanobot di funzionare all’interno delle celle logistiche. Basta 1 chip. Funziona anche senza roboport personale o robot.

