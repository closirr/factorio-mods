[item-description]
gun-nano-emitter=Invia automaticamente nanobot preprogrammati in base al tipo di munizione, finché l’emettitore nano è l’arma selezionata. I nanobot non funzionano nelle reti logistiche esistenti.
ammo-nano-termites=Distrugge alberi nel raggio. Non restituisce oggetti.
ammo-nano-scrappers=Distrugge entità contrassegnate per lo smantellamento nel raggio. Non restituisce oggetti.
ammo-nano-deconstructors=Smantella entità contrassegnate per lo smantellamento nel raggio. Ti restituisce gli oggetti.
ammo-nano-constructors=Rianima i fantasmi delle entità nel raggio usando gli oggetti nel tuo inventario. Ripara anche le entità danneggiate.
equipment-bot-chip-items=Configura i roboport personali per contrassegnare automaticamente gli oggetti a terra per la raccolta. Deve essere in una rete con robot disponibili. Gli oggetti non vengono contrassegnati se ci sono nemici nelle vicinanze.
equipment-bot-chip-trees=Configura i roboport personali per contrassegnare automaticamente gli alberi nel raggio per lo smantellamento. Deve essere in una rete con robot disponibili. Gli oggetti non vengono contrassegnati se ci sono nemici nelle vicinanze.
equipment-bot-chip-launcher=Configura i roboport personali per lanciare automaticamente unità da combattimento dall’inventario quando i nemici sono nel raggio. Richiede un roboport personale.
equipment-bot-chip-feeder=Dispositivo di emergenza: usa automaticamente oggetti di cura quando la tua salute è bassa; ogni dispositivo ha un cooldown di 2 minuti. Richiede un roboport personale.
equipment-bot-chip-nanointerface=Consente ai nanobot di funzionare all’interno delle celle logistiche. Basta 1 chip.
roboport-interface-main=Si interfaccia con la rete logistica più vicina per assegnare lavori.

