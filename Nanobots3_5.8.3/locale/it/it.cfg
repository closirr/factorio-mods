roboport-interface-main=Si interfaccia con la rete logistica più vicina per assegnare lavori.
roboport-interface-cc=Imposta segnali per assegnare lavori speciali ai robot inattivi nel network. Legno grezzo = taglia alberi; una piastrella = costruisci piastrelle. Vedi documentazione per esempi.
roboport-interface-scanner=Scansiona il network e riporta i lavori disponibili.

