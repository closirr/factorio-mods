[virtual-signal-name]
nano-signal-chop-trees=Interfaccia roboport\nSegna alberi per lo smantellamento\nImposta un valore negativo per tagliare alberi\nfinché nel network ci sono\n__1__ unità di legno grezzo.
nano-signal-item-on-ground=Interfaccia roboport\nSegna oggetti a terra
nano-signal-closest-roboport=Interfaccia roboport\nEsegui i segnali solo sul roboport\npiù vicino nel raggio
nano-signal-deconstruct-finished-miners=Interfaccia roboport\nSmantella trivelle esaurite
nano-signal-landfill-the-world=Interfaccia roboport\nRiempi tutta l’acqua con terraferma\nValore negativo: mantieni\n__1__ terraferma nel network
nano-signal-catch-fish=Interfaccia roboport\nTrova tutti i pesci\nI pesci sono buoni, i pesci sono grandi
nano-signal-build-tiles=Interfaccia roboport\nCostruisci piastrelle\nAggiungi un segnale piastrella come\nprossimo segnale per costruire quel tipo\nValore negativo: costruisci solo\nse nel network ce n’è almeno\n__1__.
nano-signal-smarter-charging=Interfaccia roboport\nRicarica intelligente\nForza periodicamente alcuni robot a trovare\nnuovi punti di ricarica.
nano-signal-upgrade-modules=Interfaccia roboport\nAggiornamento moduli\nSostituisce moduli di livello inferiore\ncon versioni di livello superiore.
nano-signal-refill-turrets=Interfaccia roboport\nRifornisci torrette\nValore positivo: rifornisci le torrette\ncon munizioni.

