[item-description]
gun-nano-emitter=Sendet automatisch vorprogrammierte Nanobots abhängig vom Munitionstyp, solange der Nano-Emitter als Waffe ausgewählt ist. Nanobots funktionieren nicht in bestehenden Logistiknetzwerken.
ammo-nano-termites=Zerstört Bäume in Reichweite. Gibt keine Items zurück.
ammo-nano-scrappers=Zerstört alle zur Dekonstruktion markierten Entitäten in Reichweite. Gibt keine Items zurück.
ammo-nano-deconstructors=Dekonstruiert alle zur Dekonstruktion markierten Entitäten in Reichweite. Bringt Items zu dir zurück.
ammo-nano-constructors=Erweckt Entitäts-Geister in Reichweite mit Items aus deinem Inventar. Repariert außerdem beschädigte Entitäten.
equipment-bot-chip-items=Konfiguriert persönliche Roboports, um Items am Boden automatisch zum Aufheben zu markieren. Muss in einem Netzwerk mit verfügbaren Robotern sein. Bei Feinden in der Nähe wird nichts markiert.
equipment-bot-chip-trees=Konfiguriert persönliche Roboports, um Bäume in Reichweite automatisch zur Dekonstruktion zu markieren. Muss in einem Netzwerk mit verfügbaren Robotern sein. Bei Feinden in der Nähe wird nichts markiert.
equipment-bot-chip-launcher=Konfiguriert persönliche Roboports, um Kampfeinheiten aus dem Inventar automatisch zu starten, wenn Feinde in Reichweite sind. Benötigt einen persönlichen Roboport.
equipment-bot-chip-feeder=Notfall-Versorger, nutzt automatisch Heil-Items bei niedrigem Leben; jeder Versorger hat 2 Minuten Abklingzeit. Benötigt einen persönlichen Roboport.
equipment-bot-chip-nanointerface=Erlaubt Nanobots in Logistikzellen zu arbeiten. Nur 1 Chip wird benötigt.
roboport-interface-main=Verbindet sich mit dem nächstgelegenen Logistiknetzwerk, um Jobs zuzuweisen.

