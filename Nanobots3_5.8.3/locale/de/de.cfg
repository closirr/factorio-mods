nano-signal-chop-trees=Roboport-Schnittstelle\nBäume zur Dekonstruktion markieren\nNegativer Wert: nur fällen, bis\nso viel Rohholz im Netzwerk ist.
nano-signal-item-on-ground=Roboport-Schnittstelle\nItems am Boden markieren
nano-signal-closest-roboport=Roboport-Schnittstelle\nSignale nur am nächsten\nRoboport in Reichweite ausführen
nano-signal-deconstruct-finished-miners=Roboport-Schnittstelle\nFertige Miner dekonstrieren
nano-signal-landfill-the-world=Roboport-Schnittstelle\nAlles Wasser mit Landfill füllen\nNegativer Wert: so viel Landfill\nim Netzwerk behalten
nano-signal-catch-fish=Roboport-Schnittstelle\nAlle Fische finden\nFische sind gut, Fische sind großartig
nano-signal-build-tiles=Roboport-Schnittstelle\nBodenplatten bauen\nFüge ein Platten-Signal als nächstes\nSignal hinzu, um diesen Typ zu bauen\nNegativer Wert: nur bauen, wenn\nmindestens so viele im Netzwerk sind.
nano-signal-smarter-charging=Roboport-Schnittstelle\nIntelligenteres Laden\nZwingt periodisch einige Roboter,\nneue Ladeplätze zu suchen.
nano-signal-upgrade-modules=Roboport-Schnittstelle\nModul-Upgrader\nTauscht Module niedriger Stufe\ngegen höhere aus.
nano-signal-refill-turrets=Roboport-Schnittstelle\nGeschütze nachfüllen\nPositiver Wert: Geschütze\nmit Munition auffüllen.

