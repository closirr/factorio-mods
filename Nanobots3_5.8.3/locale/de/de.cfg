[equipment-description]
equipment-bot-chip-items=Konfiguriert persönliche Roboports, um Items am Boden automatisch zum Aufheben zu markieren. Muss in einem Netzwerk mit verfügbaren Robotern sein. Bei Feinden in der Nähe wird nichts markiert.
equipment-bot-chip-trees=Konfiguriert persönliche Roboports, um Bäume in Reichweite automatisch zur Dekonstruktion zu markieren. Muss in einem Netzwerk mit verfügbaren Robotern sein. Bei Feinden in der Nähe wird nichts markiert.
equipment-bot-chip-launcher=Konfiguriert persönliche Roboports, um Kampfeinheiten aus dem Inventar automatisch zu starten, wenn Feinde in Reichweite sind. Benötigt einen aktiven persönlichen Roboport.
equipment-bot-chip-feeder=Notfall-Versorger, nutzt automatisch Heil-Items bei niedrigem Leben; 30 Sekunden Abklingzeit. Wenn keine Heil-Items verfügbar sind, heilt er 10 Punkte. Benötigt einen persönlichen Roboport.
equipment-bot-chip-nanointerface=Erlaubt Nanobots in Logistikzellen zu arbeiten. Nur 1 Chip wird benötigt. Funktioniert auch ohne persönlichen Roboport oder Bots.

