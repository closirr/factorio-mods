[mod-setting-description]
nanobots-nanobots-auto=Wenn aktiv, arbeitet der Nano-Emitter automatisch. Wenn deaktiviert, musst du Nanobots manuell in ein Gebiet schießen. (Noch nicht verfügbar)
nanobots-network-limits=Prüft vorhandene Logistiknetzwerke, bevor Nanobots gesendet werden.
nanobots-nano-poll-rate=Wie oft (in Ticks) nach Nanobot-Aufträgen gesucht wird. Pro Tick wird ein Spieler verarbeitet.
nanobots-nano-queue-rate=Verzögerung in Ticks zwischen Queue-Aktionen.
nanobots-nano-queue-per-cycle=Maximale Anzahl an Einträgen pro Zyklus.
nanobots-indside-area-radius=Wie weit du von einer geplanten Entität entfernt sein darfst, bevor der Auftrag abgebrochen wird.
nanobots-cell-queue-rate=Verzögerung in Ticks zwischen Checks der Roboport-Interface-Queue.
nanobots-free-bots-per=Prozentsatz verfügbarer Konstruktionsroboter, der nötig ist, damit das Interface Aufgaben queued.
nanobots-equipment-auto=Wenn aktiv, arbeitet das Nano-Rüstungs-Equipment automatisch. Wenn deaktiviert, musst du es manuell aktivieren. (Noch nicht verfügbar)
nanobots-nano-build-tiles=Nanobots können Bodenplatten bauen.
nanobots-afk-time=Wie lange (in Sekunden) du AFK sein darfst, bevor Nanobots abschalten. 0 = niemals abschalten.
nanobots-nano-fullfill-requests=Nanobots versuchen, Item-Request-Proxies zu erfüllen.
nanobots-active-emitter-mode=Der Nano-Emitter muss als Waffe ausgewählt sein, damit Nanobots arbeiten.
nanobots-log-level=Log-Level einstellen.\nOff - kein Log\nStandard - nur wichtige Meldungen\nDebug - vollständiges Tracing
nanobots-nano-repair=Nanobots reparieren automatisch beschädigte Entitäten mit Repair-Packs aus dem Inventar.

nanobots-repair-start-threshold=Reparaturen nur starten, wenn das Gesundheitsverhältnis der Entität unter diesem Wert liegt (kleine Schäden ignorieren).
nanobots-repair-max-sessions=Maximale Anzahl aktiver Reparatursitzungen pro Spieler.
nanobots-repair-hp-per-action=Wie viele HP pro Reparaturschritt repariert werden.
nanobots-repair-requeue-delay=Verzögerung in Ticks zwischen Reparaturschritten.
nanobots-repair-throttle-ticks=Dieselbe Entität nicht häufiger als alle X Ticks erneut auf Reparatur prüfen (0 deaktiviert).
nanobots-repair-combat-important-only=Im Kampf nur wichtige Ziele reparieren (Türme/Mauern/Tore → Radar → Minen → Transport).
nanobots-repair-combat-enemy-radius=Wenn ein Feind in diesem Radius ist, gilt der Spieler als „im Kampf“.
nanobots-repair-combat-recent-damage-seconds=Wenn der Spieler innerhalb dieses Zeitfensters Schaden bekam, gilt er als „im Kampf“.
nanobots-repair-cat-defense=Türme, Mauern, Tore, Radar, Minen.
nanobots-repair-cat-transport=Autos, Spidertrons, Züge und Waggons.
nanobots-repair-cat-power=Komplette Energiekette (Strom + Dampf/Wärme/Flüssigkeiten).
nanobots-repair-cat-production=Assembler, Öfen, Bohrer, Inserter, Roboports, Labore, Beacons.
nanobots-repair-cat-other=Container, Tanks und sonstige Entitäten.

[string-mod-setting]
nanobots-log-level-off=Aus
nanobots-log-level-standard=Standard
nanobots-log-level-debug=Debug