[item-description]
gun-nano-emitter=Nano yayıcı seçili silah olduğu sürece, mühimmat türüne göre önceden programlanmış nanobotları otomatik gönderir. Nanobotlar mevcut lojistik ağların içinde çalışmaz.
ammo-nano-termites=Menzildeki ağaçları yok eder. Öğe geri getirmez.
ammo-nano-scrappers=Menzilde söküm için işaretlenmiş varlıkları yok eder. Öğe geri getirmez.
ammo-nano-deconstructors=Menzilde söküm için işaretlenmiş varlıkları söker. Öğeleri size geri getirir.
ammo-nano-constructors=Envanterinizdeki öğeleri kullanarak menzildeki hayalet varlıkları canlandırır. Hasarlı varlıkları da onarır.
equipment-bot-chip-items=Kişisel roboportları, yerdeki öğeleri otomatik toplama için işaretleyecek şekilde ayarlar. Kullanılabilir robotların olduğu bir ağ gerekir. Yakında düşman varsa işaretlemez.
equipment-bot-chip-trees=Kişisel roboportları, menzildeki ağaçları otomatik söküm için işaretleyecek şekilde ayarlar. Kullanılabilir robotların olduğu bir ağ gerekir. Yakında düşman varsa işaretlemez.
equipment-bot-chip-launcher=Düşmanlar menzildeyken envanterden savaş birimlerini otomatik fırlatacak şekilde kişisel roboportu ayarlar. Kişisel roboport gerekir.
equipment-bot-chip-feeder=Acil besleyici: canınız düşükken iyileştirme öğelerini otomatik kullanır; her besleyicinin 2 dakika bekleme süresi vardır. Kişisel roboport gerekir.
equipment-bot-chip-nanointerface=Nanobotların lojistik hücrelerde çalışmasını sağlar. 1 çip yeterlidir.
