equipment-bot-chip-feeder=Acil besleyici: canınız düşükken iyileştirme öğelerini otomatik kullanır; 30 saniye bekleme süresi. İyileştirme öğesi yoksa 10 puan iyileştirir. Kişisel roboport gerekir.
equipment-bot-chip-nanointerface=Nanobotların lojistik hücrelerde çalışmasını sağlar. 1 çip yeterlidir. Kişisel roboport veya bot olmadan da çalışır.

