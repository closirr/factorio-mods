[mod-setting-description]
nanobots-nanobots-auto=Açıksa nano yayıcı otomatik çalışır. Kapalıysa nanobotları alana manuel atmanız gerekir. (Henüz yok)
nanobots-network-limits=Nanobotları göndermeden önce mevcut lojistik ağları kontrol eder.
nanobots-nano-poll-rate=Nanobot emirlerini arama sıklığı (tik). Her tikte bir oyuncu işlenir.
nanobots-nano-queue-rate=Kuyruk eylemleri arasındaki gecikme (tik).
nanobots-nano-queue-per-cycle=Çevrim başına kuyruğa alınan azami varlık sayısı.
nanobots-indside-area-radius=Kuyruktaki görev bu mesafeden uzaklaşınca iptal edilir.
nanobots-cell-queue-rate=Arayüz tarafından kuyruklanan roboportların kontrol aralığı (tik).
nanobots-free-bots-per=Arayüzün eylemleri kuyruğa alması için gereken kullanılabilir inşaat botu yüzdesi.
nanobots-equipment-auto=Açıksa ekipman otomatik çalışır; kapalıysa manuel etkinleştirme gerekir. (Henüz yok)
nanobots-nano-build-tiles=Nanobotların karo döşemesine izin verir.
nanobots-afk-time=AFK kaldıktan sonra nanobotların kapanma süresi (s). 0 = hiç kapanmaz.
nanobots-nano-fullfill-requests=Nanobotlar item-request proxy'leri doldurmaya çalışır.
nanobots-active-emitter-mode=Nanobotların çalışması için nano yayıcı seçili silah olmalıdır.
nanobots-log-level=Günlük seviyesini ayarlar.\nOff - kapalı\nStandard - önemli mesajlar\nDebug - tam izleme
nanobots-nano-repair=Nanobotlar envanterdeki tamir paketlerini kullanarak hasarlı varlıkları otomatik onarır.

nanobots-repair-start-threshold=Varlığın sağlık oranı bu değerin altındaysa onarımı başlatır (küçük hasarı yok sayar).
nanobots-repair-max-sessions=Oyuncu başına azami aktif onarım oturumu.
nanobots-repair-hp-per-action=Her onarım adımında onarılan HP miktarı.
nanobots-repair-requeue-delay=Onarım adımları arasındaki gecikme (tik).
nanobots-repair-throttle-ticks=Aynı varlığı bu tik sayısından daha sık tekrar kontrol etme (0 kapatır).
nanobots-repair-combat-important-only=Savaşta sadece önemli hedefleri onar (taret/duvar/kapı → radar → mayın → taşıt).
nanobots-repair-combat-enemy-radius=Bu yarıçapta düşman varsa oyuncu “savaşta” sayılır.
nanobots-repair-combat-recent-damage-seconds=Bu süre içinde hasar aldıysa oyuncu “savaşta” sayılır.
nanobots-repair-cat-defense=Taretler, duvarlar, kapılar, radar, mayınlar.
nanobots-repair-cat-transport=Araçlar, spidertronlar, trenler ve vagonlar.
nanobots-repair-cat-power=Tüm enerji zinciri (elektrik + buhar/ısı/sıvı altyapısı).
nanobots-repair-cat-production=Montaj makineleri, fırınlar, maden sondajları, inserterlar, roboportlar, laboratuvarlar, beaconlar.
nanobots-repair-cat-other=Konteynerler, tanklar ve diğer varlıklar.

