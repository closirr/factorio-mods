nano-signal-upgrade-modules=Roboport-interface\nModule-upgrader\nVervangt modules van lagere tier\ndoor hogere.
nano-signal-refill-turrets=Roboport-interface\nVul torens bij\nPositieve waarde: vul torens\nmet munitie.

