nano-signal-item-on-ground=Roboport-interface\nMarkeer items op de grond
nano-signal-closest-roboport=Roboport-interface\nVoer signalen alleen uit op de\ndichtstbijzijnde roboport binnen bereik
nano-signal-deconstruct-finished-miners=Roboport-interface\nOntmantel uitgeputte miners
nano-signal-landfill-the-world=Roboport-interface\nVul al het water met landfill\nNegatieve waarde: behoud\nzoveel landfill in het netwerk
nano-signal-catch-fish=Roboport-interface\nVind alle vissen\nVissen zijn goed, vissen zijn geweldig
nano-signal-build-tiles=Roboport-interface\nBouw tegels\nVoeg een tegel-signaal toe als\nvolgend signaal om dat type te bouwen\nNegatieve waarde: bouw alleen als\nminstens zoveel in het netwerk is.
