[item-description]
gun-nano-emitter=Stuurt automatisch voorgeprogrammeerde nanobots op basis van het ammotype, zolang de nano-emitter het geselecteerde wapen is. Nanobots werken niet in bestaande logistieke netwerken.
ammo-nano-termites=Vernietigt bomen binnen bereik. Geeft geen items terug.
ammo-nano-scrappers=Vernietigt entiteiten gemarkeerd voor ontmanteling binnen bereik. Geeft geen items terug.
ammo-nano-deconstructors=Ontmantelt entiteiten gemarkeerd voor ontmanteling binnen bereik. Brengt items naar je terug.
ammo-nano-constructors=Herstelt entiteit-ghosts binnen bereik met items uit je inventaris. Repareert ook beschadigde entiteiten.
equipment-bot-chip-items=Configureert persoonlijke roboports om items op de grond automatisch te markeren voor ophalen. Vereist een netwerk met beschikbare robots. Items worden niet gemarkeerd als er vijanden in de buurt zijn.
equipment-bot-chip-trees=Configureert persoonlijke roboports om bomen binnen bereik automatisch te markeren voor ontmanteling. Vereist een netwerk met beschikbare robots. Wordt niet gemarkeerd als er vijanden in de buurt zijn.
equipment-bot-chip-launcher=Configureert persoonlijke roboports om gevechtseenheden automatisch vanuit het inventaris te lanceren wanneer vijanden binnen bereik zijn. Vereist een persoonlijke roboport.
equipment-bot-chip-feeder=Noodvoeder: gebruikt automatisch genezende items bij lage gezondheid; elke feeder heeft 2 minuten cooldown. Vereist een persoonlijke roboport.
equipment-bot-chip-nanointerface=Laat nanobots werken binnen logistieke cellen. Slechts 1 chip is nodig.
roboport-interface-main=Koppelt aan het dichtstbijzijnde logistieke netwerk om taken toe te wijzen.

