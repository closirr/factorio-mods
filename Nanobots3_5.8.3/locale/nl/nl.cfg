[equipment-description]
equipment-bot-chip-items=Configureert persoonlijke roboports om items op de grond automatisch te markeren voor ophalen. Vereist een netwerk met beschikbare robots. Items worden niet gemarkeerd als er vijanden in de buurt zijn.
equipment-bot-chip-trees=Configureert persoonlijke roboports om bomen binnen bereik automatisch te markeren voor ontmanteling. Vereist een netwerk met beschikbare robots. Wordt niet gemarkeerd als er vijanden in de buurt zijn.
equipment-bot-chip-launcher=Configureert persoonlijke roboports om gevechtseenheden automatisch vanuit het inventaris te lanceren wanneer vijanden binnen bereik zijn. Vereist een actieve persoonlijke roboport.
equipment-bot-chip-feeder=Noodvoeder: gebruikt automatisch genezende items bij lage gezondheid; 30 seconden cooldown. Als er geen genezende items zijn, geneest het 10 punten. Vereist een persoonlijke roboport.
equipment-bot-chip-nanointerface=Laat nanobots werken binnen logistieke cellen. Slechts 1 chip is nodig. Werkt ook zonder persoonlijke roboport of bots.

