[mod-setting-description]
nanobots-nanobots-auto=Als ingeschakeld werkt de nano-emitter automatisch. Zo niet, dan moet je nanobots handmatig afvuren. (Nog niet beschikbaar)
nanobots-network-limits=Controleert bestaande logistieke netwerken voordat nanobots worden verstuurd.
nanobots-nano-poll-rate=Hoe vaak (in ticks) nanobot-opdrachten worden gezocht. Elke tick wordt één speler verwerkt.
nanobots-nano-queue-rate=Vertraging in ticks tussen queue-acties.
nanobots-nano-queue-per-cycle=Maximaal aantal entiteiten dat per cyclus in de queue wordt gezet.
nanobots-indside-area-radius=Hoe ver je van een queued entiteit mag zijn voordat de taak wordt geannuleerd.
nanobots-cell-queue-rate=Vertraging in ticks tussen controles van roboports die door de interface zijn queued.
nanobots-free-bots-per=Percentage beschikbare bouwrobots dat nodig is voor de interface om taken te queue’en.
nanobots-equipment-auto=Als ingeschakeld werkt nano-pantseruitrusting automatisch. Anders moet je het handmatig activeren. (Nog niet beschikbaar)
nanobots-nano-build-tiles=Nanobots kunnen tegels bouwen.
nanobots-afk-time=Hoe lang (in seconden) je AFK mag zijn voordat nanobots uitschakelen. 0 = nooit.
nanobots-nano-fullfill-requests=Nanobots proberen item-request proxies te vervullen.
nanobots-active-emitter-mode=De nano-emitter moet het geselecteerde wapen zijn om nanobots te laten werken.
nanobots-log-level=Stel het logniveau in.\nOff - geen logs\nStandard - alleen belangrijke berichten\nDebug - volledige trace
nanobots-nano-repair=Nanobots repareren automatisch beschadigde entiteiten met repair packs uit je inventaris.

nanobots-repair-start-threshold=Start reparaties alleen als de health ratio onder deze waarde komt (negeert kleine schade).
nanobots-repair-max-sessions=Maximaal aantal actieve reparatiesessies per speler.
nanobots-repair-hp-per-action=Hoeveel HP per reparatiestap wordt hersteld.
nanobots-repair-requeue-delay=Vertraging in ticks tussen reparatiestappen.
nanobots-repair-throttle-ticks=Controleer dezelfde entiteit niet vaker dan dit aantal ticks (0 schakelt uit).
nanobots-repair-combat-important-only=Tijdens gevecht alleen belangrijke doelen repareren (turrets/muren/poorten → radar → mijnen → transport).
nanobots-repair-combat-enemy-radius=Als een vijand binnen deze radius is, geldt de speler als “in gevecht”.
nanobots-repair-combat-recent-damage-seconds=Als de speler recent schade kreeg binnen dit venster, geldt “in gevecht”.
nanobots-repair-cat-defense=Turrets, muren, poorten, radar, mijnen.
nanobots-repair-cat-transport=Auto’s, spidertrons, treinen en wagons.
nanobots-repair-cat-power=Volledige stroomketen (elektra + stoom/warmte/vloeistoffen).
nanobots-repair-cat-production=Assemblers, ovens, miners, inserters, roboports, labs, beacons.
nanobots-repair-cat-other=Containers, tanks en overige entiteiten.

