[entity-description]
roboport-interface-main=Se connecte au réseau logistique le plus proche pour assigner des tâches.
roboport-interface-cc=Réglez les signaux pour donner des tâches spéciales aux robots inactifs du réseau. Bois brut = couper du bois, tuile = construire des tuiles. Voir la documentation pour plus d’exemples.
roboport-interface-scanner=Scanne le réseau et rapporte les tâches disponibles.

