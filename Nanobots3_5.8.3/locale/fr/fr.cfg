[item-description]
gun-nano-emitter=Envoie automatiquement des nanobots préprogrammés selon le type de munition tant que l’émetteur nano est l’arme sélectionnée. Les nanobots ne fonctionnent pas dans les réseaux logistiques existants.
ammo-nano-termites=Détruit les arbres à portée. Ne renvoie pas d’objets.
ammo-nano-scrappers=Détruit les entités marquées pour démontage à portée. Ne renvoie pas d’objets.
ammo-nano-deconstructors=Démonte les entités marquées pour démontage à portée. Renvoie les objets vers vous.
ammo-nano-constructors=Réanime les fantômes d’entités à portée en utilisant les objets de votre inventaire. Répare aussi les entités endommagées.
equipment-bot-chip-items=Configure les roboports personnels pour marquer automatiquement les objets au sol à ramasser. Doit être dans un réseau avec des robots disponibles. Ne marque pas si des ennemis sont proches.
equipment-bot-chip-trees=Configure les roboports personnels pour marquer automatiquement les arbres à portée pour démontage. Doit être dans un réseau avec des robots disponibles. Ne marque pas si des ennemis sont proches.
equipment-bot-chip-launcher=Configure les roboports personnels pour lancer automatiquement des unités de combat depuis l’inventaire lorsque des ennemis sont à portée. Nécessite un roboport personnel.
equipment-bot-chip-feeder=Distributeur d’urgence : utilise automatiquement des objets de soin quand votre santé est basse ; chaque distributeur a 2 minutes de recharge. Nécessite un roboport personnel.
equipment-bot-chip-nanointerface=Permet aux nanobots de fonctionner dans les cellules logistiques. Un seul chip est nécessaire.
roboport-interface-main=Se connecte au réseau logistique le plus proche pour assigner des tâches.

