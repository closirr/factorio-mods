[virtual-signal-name]
nano-signal-chop-trees=Interface roboport\nMarquer les arbres pour démontage\nValeur négative : couper les arbres\njusqu’à avoir\ncette quantité de bois dans le réseau.
nano-signal-item-on-ground=Interface roboport\nMarquer les objets au sol
nano-signal-closest-roboport=Interface roboport\nExécuter les signaux uniquement sur\nle roboport le plus proche à portée
nano-signal-deconstruct-finished-miners=Interface roboport\nDémonter les mineurs terminés
nano-signal-landfill-the-world=Interface roboport\nRemplir toute l’eau avec du remblai\nValeur négative : conserver\ncette quantité de remblai dans le réseau
nano-signal-catch-fish=Interface roboport\nTrouver tous les poissons\nLes poissons sont bons, les poissons sont géniaux
nano-signal-build-tiles=Interface roboport\nConstruire des tuiles\nAjoutez un signal de tuile comme\nprochain signal pour construire ce type\nValeur négative : construire seulement\nsi au moins\ncette quantité est dans le réseau.
nano-signal-smarter-charging=Interface roboport\nRecharge plus intelligente\nForce périodiquement certains robots\nà trouver de nouveaux emplacements de charge.
nano-signal-upgrade-modules=Interface roboport\nMise à niveau des modules\nRemplace les modules de niveau inférieur\npar des versions supérieures.
nano-signal-refill-turrets=Interface roboport\nRecharger les tourelles\nValeur positive : remplir les tourelles\navec des munitions.

[virtual-signal-description]
nano-signal-item-on-ground=Marquer les objets au sol

