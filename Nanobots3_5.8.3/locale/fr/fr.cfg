[equipment-description]
equipment-bot-chip-items=Configure les roboports personnels pour marquer automatiquement les objets au sol à ramasser. Doit être dans un réseau avec des robots disponibles. Ne marque pas si des ennemis sont proches.
equipment-bot-chip-trees=Configure les roboports personnels pour marquer automatiquement les arbres à portée pour démontage. Doit être dans un réseau avec des robots disponibles. Ne marque pas si des ennemis sont proches.
equipment-bot-chip-launcher=Configure les roboports personnels pour lancer automatiquement des unités de combat depuis l’inventaire lorsque des ennemis sont à portée. Nécessite un roboport personnel actif.
equipment-bot-chip-feeder=Distributeur d’urgence : utilise automatiquement des objets de soin quand votre santé est basse ; recharge 30 secondes. Si aucun objet de soin n’est disponible, soigne 10 points. Nécessite un roboport personnel.
equipment-bot-chip-nanointerface=Permet aux nanobots de fonctionner dans les cellules logistiques. Un seul chip est nécessaire. Fonctionne même sans roboport personnel ni bots.

