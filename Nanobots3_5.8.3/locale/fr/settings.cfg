[mod-setting-description]
nanobots-nanobots-auto=Si activé, l’émetteur nano fonctionne automatiquement. Sinon, vous devrez tirer les nanobots manuellement dans une zone. (Pas encore disponible)
nanobots-network-limits=Vérifie les réseaux logistiques existants avant d’envoyer les nanobots.
nanobots-nano-poll-rate=À quelle fréquence (en ticks) les ordres des nanobots sont recherchés. Un joueur est traité par tick.
nanobots-nano-queue-rate=Délai en ticks entre actions de la file.
nanobots-nano-queue-per-cycle=Nombre maximal d’entités ajoutées à la file par cycle.
nanobots-indside-area-radius=Distance maximale avant annulation d’une entité en file.
nanobots-cell-queue-rate=Délai en ticks entre vérifications des roboports mis en file par l’interface.
nanobots-free-bots-per=Pourcentage de robots de construction disponibles requis pour que l’interface mette des actions en file.
nanobots-equipment-auto=Si activé, l’équipement de l’armure nano fonctionne automatiquement. Sinon, activation manuelle. (Pas encore disponible)
nanobots-nano-build-tiles=Permet aux nanobots de construire des tuiles.
nanobots-afk-time=Durée (en secondes) avant arrêt des nanobots en AFK. 0 = jamais.
nanobots-nano-fullfill-requests=Les nanobots tenteront de remplir les item-request proxies.
nanobots-active-emitter-mode=L’émetteur nano doit être l’arme sélectionnée pour que les nanobots fonctionnent.
nanobots-log-level=Définit le niveau de logs.\nOff - aucun log\nStandard - messages importants\nDebug - traçage complet
nanobots-nano-repair=Les nanobots réparent automatiquement les entités endommagées en utilisant des repair packs depuis l’inventaire.

nanobots-repair-start-threshold=Démarrer la réparation uniquement si le ratio de vie de l’entité est inférieur à cette valeur (ignore les petits dégâts).
nanobots-repair-max-sessions=Nombre maximum de sessions de réparation actives par joueur.
nanobots-repair-hp-per-action=Nombre de PV réparés par étape de réparation.
nanobots-repair-requeue-delay=Délai en ticks entre les étapes de réparation.
nanobots-repair-throttle-ticks=Ne pas re-vérifier la même entité plus souvent que ce nombre de ticks (0 désactive).
nanobots-repair-combat-important-only=En combat, réparer uniquement les cibles importantes (tourelles/murs/portes → radar → mines → transport).
nanobots-repair-combat-enemy-radius=Si un ennemi est dans ce rayon, le joueur est considéré “en combat”.
nanobots-repair-combat-recent-damage-seconds=Si le joueur a subi des dégâts dans cette fenêtre, il est considéré “en combat”.
nanobots-repair-cat-defense=Tourelles, murs, portes, radar, mines.
nanobots-repair-cat-transport=Voitures, spidertrons, trains et wagons.
nanobots-repair-cat-power=Chaîne complète d’énergie (électricité + vapeur/chaleur/fluides).
nanobots-repair-cat-production=Assembleurs, fours, foreuses, bras, roboports, labos, balises.
nanobots-repair-cat-other=Conteneurs, réservoirs et autres entités.

[string-mod-setting]
nanobots-log-level-off=Désactivé
nanobots-log-level-standard=Standard
nanobots-log-level-debug=Debug