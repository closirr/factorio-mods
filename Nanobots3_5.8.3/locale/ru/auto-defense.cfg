[mod-setting-description]
nanobots-auto-defense-threshold=Когда количество патронов в турели упадёт ниже этого порога, начнётся пополнение.
nanobots-auto-defense-delivery=Сколько боеприпасов доставить в турель.
nanobots-auto-defense-artillery-threshold=Порог для артиллерии.
nanobots-auto-defense-artillery-delivery=Количество доставки для артиллерии.
nanobots-auto-defense-gun-turrets=Автоматически пополнять пулемётные турели.
nanobots-auto-defense-artillery-turrets=Автоматически пополнять артиллерийские турели.
nanobots-auto-defense-modded-turrets=Автоматически пополнять ракетные турели, рельсотронные турели и модовые турели. Определяются по типу сущности (ammo-turret, artillery-turret).
nanobots-auto-defense-ammo-type-priority=Какой тип боеприпасов использовать первым. Используется в мирное время (или всегда, если Боевой режим выключен).
nanobots-auto-defense-ammo-quality-priority=Какое качество использовать первым. Используется в мирное время (или всегда, если Боевой режим выключен).
nanobots-auto-defense-warning-interval=Как часто показывать предупреждения когда ТУРЕЛЬ не может быть заправлена (нет подходящих патронов). 30-300 сек.
nanobots-auto-defense-scan-interval=Базовый интервал сканирования (60 тиков = 1 секунда). С адаптивным сканированием: в 2 раза быстрее в бою, в 1.5 раза медленнее в мирное время.
nanobots-auto-defense-max-per-tick=Максимум турелей для обработки за одно сканирование.
nanobots-auto-defense-combat-mode=Авто-переключение приоритета по наличию врагов. В БОЮ: всегда лучшие патроны. В МИРЕ: используются настройки ниже. Отключите для ручного управления.
nanobots-auto-defense-auto-enable-combat=Автоматически ВКЛЮЧАТЬ систему поставки при появлении врагов и ВЫКЛЮЧАТЬ в мирное время. Отличается от Боевого приоритета, который меняет только КАКИЕ патроны использовать.
nanobots-auto-defense-adaptive-scan=Быстрее при врагах (2x скорость), медленнее в мирное время (1.5x интервал). Экономит UPS в спокойные периоды.
nanobots-auto-defense-show-projectile=Показывать визуальный снаряд летящий от игрока к турели при каждой доставке. Отключите для лучшей производительности на мегабазах.
nanobots-auto-defense-low-nano-threshold=Когда нано-зарядов осталось столько или меньше — показать предупреждение со звуком. 0 = отключить.
nanobots-low-nano-warning-interval=Как часто повторять предупреждение когда НАНО-ЗАРЯДЫ заканчиваются (flying text). От 30 сек до 5 мин.
nanobots-wrong-ammo-warning-interval=Как часто предупреждать что Автозащита приостановлена из-за неподходящих патронов (напр. термиты). 0 = отключить.
nanobots-log-level=Уровень детализации логов для ВСЕХ систем. 'выкл' = нет логов, 'стандартный' = базовая информация, 'отладка' = детальная информация.
nanobots-debug-repair-system=Показывать логи для системы ремонта и строительства. [font=default-semibold]Требует Уровень ≥ 'стандартный'[/font]
nanobots-debug-defense-system=Показывать логи для автоматической доставки боеприпасов. [font=default-semibold]Требует Уровень ≥ 'стандартный'[/font]

