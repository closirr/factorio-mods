[equipment-description]
equipment-bot-chip-items=Настраивает персональные робопорты: автоматически помечать предметы на земле для подбора. Требуется сеть с доступными роботами. Если рядом враги — предметы не помечаются.
equipment-bot-chip-trees=Настраивает персональные робопорты: автоматически помечать деревья в радиусе на разборку. Требуется сеть с доступными роботами. Если рядом враги — деревья не помечаются.
equipment-bot-chip-launcher=Настраивает персональные робопорты: автоматически запускать боевые юниты из инвентаря, когда враги в радиусе. Требуется активный персональный робопорт.
equipment-bot-chip-feeder=Экстренный питатель: автоматически использует лечащие предметы при низком здоровье; перезарядка 30 секунд. Если лечащих предметов нет — лечит на 10. Требуется персональный робопорт.
equipment-bot-chip-nanointerface=Позволяет наноботам работать внутри логистических ячеек. Достаточно 1 чипа. Работает даже без персонального робопорта и ботов.

