[item-description]
gun-nano-emitter=Автоматически отправляет преднастроенных наноботов в зависимости от типа боеприпаса, пока нано-эмиттер выбран текущим оружием. Наноботы не работают внутри существующих логистических сетей.
ammo-nano-termites=Уничтожает деревья в радиусе. Предметы не возвращает.
ammo-nano-scrappers=Уничтожает любые сущности, помеченные на разборку, в радиусе. Предметы не возвращает.
ammo-nano-deconstructors=Разбирает любые сущности, помеченные на разборку, в радиусе. Возвращает предметы вам.
ammo-nano-constructors=Воскрешает призраки сущностей в радиусе, используя предметы из вашего инвентаря. Также ремонтирует повреждённые сущности, используя ремкомплекты.
equipment-bot-chip-items=Настраивает персональные робопорты: автоматически помечать предметы на земле для подбора. Требуется сеть с доступными роботами. Если рядом враги — предметы не помечаются.
equipment-bot-chip-trees=Настраивает персональные робопорты: автоматически помечать деревья в радиусе на разборку. Требуется сеть с доступными роботами. Если рядом враги — деревья не помечаются.
equipment-bot-chip-launcher=Настраивает персональные робопорты: автоматически запускать боевые юниты из инвентаря, когда враги в радиусе. Требуется персональный робопорт.
equipment-bot-chip-feeder=Экстренный питатель: автоматически использует лечащие предметы при низком здоровье. Каждый питатель имеет перезарядку 2 минуты. Требуется персональный робопорт.
equipment-bot-chip-nanointerface=Позволяет наноботам работать внутри логистических ячеек. Достаточно 1 чипа.
roboport-interface-main=Подключается к ближайшей логистической сети для назначения задач.

