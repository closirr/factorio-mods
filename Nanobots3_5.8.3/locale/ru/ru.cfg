[virtual-signal-name]
nano-signal-chop-trees=Интерфейс робопорта\nПометить деревья на разборку\nОтрицательное значение — рубить деревья,\nпока в сети не будет\nстолько-то сырой древесины.
nano-signal-item-on-ground=Интерфейс робопорта\nПометить предметы на земле
nano-signal-closest-roboport=Интерфейс робопорта\nВыполнять сигналы только\nна ближайшем робопорте\nв радиусе
nano-signal-deconstruct-finished-miners=Интерфейс робопорта\nРазбирать завершённые буры
nano-signal-landfill-the-world=Интерфейс робопорта\nЗасыпать всю воду грунтом\nОтрицательное значение —\nдержать в сети минимум\nстолько-то грунта
nano-signal-catch-fish=Интерфейс робопорта\nНайти всю рыбу\nРыба хороша, рыба прекрасна
nano-signal-build-tiles=Интерфейс робопорта\nСтроить плитки\nДобавьте сигнал плитки как следующий\nдля строительства этого типа\nОтрицательное значение — строить только\nесли в сети есть минимум\nстолько-то.
nano-signal-smarter-charging=Интерфейс робопорта\nУмная зарядка ботов\nПериодически заставляет некоторых роботов\nискать новые места зарядки.
nano-signal-upgrade-modules=Интерфейс робопорта\nАпгрейд модулей\nЗаменяет модули низшего уровня\nна более высокий.
nano-signal-refill-turrets=Интерфейс робопорта\nПополнить турели\nПоложительное значение —\nпополнять турели боеприпасами.

