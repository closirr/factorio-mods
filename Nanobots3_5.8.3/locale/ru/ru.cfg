[entity-description]
roboport-interface-main=Подключается к ближайшей логистической сети для назначения задач.
roboport-interface-cc=Задайте сигналы, чтобы выдавать неактивным роботам специальные задания в сети. Сырая древесина — рубить деревья, сигнал плитки — строить плитки. См. документацию для примеров.
roboport-interface-scanner=Сканирует сеть и сообщает о доступных заданиях.

