[mod-setting-description]
nanobots-nanobots-auto=Если включено, нано-эмиттер работает автоматически. Если выключено — нужно вручную “стрелять” наноботами в область. (Пока недоступно)
nanobots-network-limits=Проверяет наличие логистических сетей перед отправкой наноботов.
nanobots-nano-poll-rate=Как часто (в тиках) искать задания для наноботов. Каждый тик обрабатывается один игрок.
nanobots-nano-queue-rate=Задержка в тиках между действиями очереди.
nanobots-nano-queue-per-cycle=Максимум сущностей, добавляемых в очередь за один цикл.
nanobots-indside-area-radius=На каком расстоянии от задания оно будет отменено.
nanobots-cell-queue-rate=Задержка в тиках между проверками робопортов в интерфейсе логистической сети.
nanobots-free-bots-per=Только для ИНТЕРФЕЙСА РОБОПОРТОВ (не наноботы!). Процент обычных строительных роботов для РЕЗЕРВИРОВАНИЯ в логистической сети. 0% = использовать всех, 50% = половину держать для других задач, 100% = не использовать роботов.
nanobots-equipment-auto=Если включено, оборудование bot-chip (пусковая установка, сборщик предметов, рубщик деревьев, лечение щитов) работает автоматически. Если выключено — нужно активировать вручную.
nanobots-nano-build-tiles=Разрешает наноботам строить плитки.
nanobots-afk-time=Сколько секунд можно быть AFK до отключения наноботов. 0 = никогда не отключать.
nanobots-nano-fullfill-requests=Наноботы будут пытаться выполнять item-request-proxy (запросы предметов/модулей).
nanobots-active-emitter-mode=Нано-эмиттер должен быть выбранным оружием, чтобы наноботы работали.
nanobots-log-level=Уровень логирования наноботов.\nOff - без логов\nStandard - только важные сообщения (модули, результат)\nDebug - полный трейс и все операции
nanobots-nano-repair=Наноботы автоматически ремонтируют повреждённые сущности, используя ремкомплекты из инвентаря.

; --- Repair 4.7.0 ---
nanobots-repair-start-threshold=Начинать ремонт только если доля здоровья сущности ниже этого значения (игнорирует мелкие повреждения).
nanobots-repair-max-sessions=Максимальное количество активных ремонтных сессий на игрока.
nanobots-repair-hp-per-action=Сколько HP восстанавливается за один шаг ремонта.
nanobots-repair-requeue-delay=Задержка в тиках между шагами ремонта.
nanobots-repair-throttle-ticks=Не проверять одну и ту же сущность на ремонт чаще указанного числа тиков (0 отключает).
nanobots-repair-combat-important-only=Если игрок в бою — чинить только важное (турели/стены/ворота → радар → мины → транспорт).
nanobots-repair-combat-enemy-radius=Если в этом радиусе есть враг — считается, что игрок в бою.
nanobots-repair-combat-recent-damage-seconds=Если игрок получал урон в этом окне времени — считается, что игрок в бою.
nanobots-repair-cat-defense=Турели, стены, ворота, радары, мины.
nanobots-repair-cat-transport=Машины, пауко-троны, поезда и вагоны.
nanobots-repair-cat-power=Вся энергетическая цепочка (электрика + пар/тепло/флюиды).
nanobots-repair-cat-production=Сборщики, печи, буры, манипуляторы, робопорты, лаборатории, маяки.
nanobots-repair-cat-other=Контейнеры, резервуары и прочие сущности.

